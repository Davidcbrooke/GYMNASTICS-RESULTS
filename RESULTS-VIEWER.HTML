<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Competition Results</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a2340; --accent: #c8102e; --accent-light: rgba(200,16,46,0.08);
    --gold: #b8972a; --off-white: #f7f8fa; --border: #e2e6ed;
    --text: #1a2340; --text-mid: #4a5568; --text-light: #8a96a8;
    --shadow: 0 2px 12px rgba(26,35,64,0.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--off-white); color: var(--text); min-height: 100vh; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; min-width: 260px; background: var(--navy); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-title { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .sidebar-subtitle { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.3; }
  .tab-bar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .tab-btn { flex: 1; padding: 10px 8px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; text-align: center; }
  .tab-btn:hover { color: rgba(255,255,255,0.7); }
  .tab-btn.active { color: #fff; border-bottom-color: var(--accent); }
  .sidebar-status { padding: 10px 14px; margin: 10px 14px 0; background: rgba(255,255,255,0.06); border-radius: 8px; font-size: 12px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.loading { background: #FFB800; animation: pulse 1s infinite; }
  .status-dot.ok { background: #22c55e; }
  .status-dot.error { background: var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .refresh-btn { margin: 8px 14px 0; padding: 8px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; width: calc(100% - 28px); transition: all 0.15s; }
  .refresh-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .comp-list { padding: 8px 0; flex: 1; }
  .comp-item { padding: 10px 20px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .comp-item:hover { background: rgba(255,255,255,0.05); }
  .comp-item.active { background: rgba(255,255,255,0.08); border-left-color: var(--accent); }
  .comp-name { font-size: 13px; font-weight: 600; color: #fff; }
  .comp-date { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .comp-count { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
  .no-comps { padding: 20px; text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; line-height: 1.6; }
  .league-info { padding: 16px 20px; flex: 1; }
  .league-info-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .league-info-text { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.7; }
  .league-stat { margin-top: 16px; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 12px 14px; }
  .league-stat-num { font-size: 24px; font-weight: 800; color: #fff; }
  .league-stat-lbl { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .main-header { background: #fff; border-bottom: 1px solid var(--border); padding: 20px 28px; box-shadow: var(--shadow); }
  .main-title { font-size: 20px; font-weight: 700; color: var(--navy); }
  .main-meta { font-size: 13px; color: var(--text-light); margin-top: 3px; }
  .filters-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-label { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; }
  .filter-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--text); background: var(--off-white); outline: none; cursor: pointer; min-width: 120px; max-width: 170px; }
  .filter-select:focus { border-color: var(--navy); }
  .filter-search { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--text); background: var(--off-white); outline: none; min-width: 150px; }
  .filter-search:focus { border-color: var(--navy); }
  .filter-search::placeholder { color: var(--text-light); }
  .clear-btn { padding: 7px 14px; background: transparent; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-mid); cursor: pointer; align-self: flex-end; transition: all 0.15s; }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
  .active-filters { padding: 8px 28px; background: var(--accent-light); border-bottom: 1px solid rgba(200,16,46,0.12); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .active-filters-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
  .filter-tag { display: inline-flex; align-items: center; gap: 5px; background: #fff; border: 1px solid rgba(200,16,46,0.2); border-radius: 20px; padding: 3px 10px 3px 12px; font-size: 12px; font-weight: 500; color: var(--navy); }
  .filter-tag button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 14px; line-height: 1; padding: 0; }
  .results-area { flex: 1; overflow-y: auto; padding: 20px 28px; }
  .results-summary { font-size: 13px; color: var(--text-light); margin-bottom: 14px; font-weight: 500; }
  .results-summary span { color: var(--navy); font-weight: 700; }
  .apparatus-section { margin-bottom: 28px; }
  .apparatus-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--navy); }
  .apparatus-name { font-size: 15px; font-weight: 700; color: var(--navy); }
  .apparatus-count { font-size: 12px; font-weight: 600; color: var(--text-light); background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; }
  .results-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
  .results-table thead tr { background: var(--navy); }
  .results-table th { padding: 10px 13px; text-align: left; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; cursor: pointer; user-select: none; }
  .results-table th:hover { color: #fff; }
  .results-table th.sorted { color: #fff; }
  .results-table th .sort-icon { margin-left: 4px; opacity: 0.5; }
  .results-table th.sorted .sort-icon { opacity: 1; color: var(--gold); }
  .results-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .results-table tbody tr:last-child { border-bottom: none; }
  .results-table tbody tr:hover { background: var(--off-white); }
  .results-table td { padding: 10px 13px; font-size: 13px; color: var(--text); }
  .rank-cell { font-weight: 700; color: var(--text-light); font-size: 12px; width: 36px; }
  .rank-1 { color: #b8972a; } .rank-2 { color: #8a9399; } .rank-3 { color: #a0634a; }
  .score-cell { font-weight: 700; color: var(--navy); font-size: 14px; }
  .total-cell { font-weight: 800; color: var(--accent); font-size: 15px; }
  .member-cell { font-family: monospace; font-size: 12px; color: var(--text-mid); }
  .badge span { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(26,35,64,0.06); color: var(--navy); }
  .apparatus-score { text-align: center; }
  .apparatus-score.best { font-weight: 700; color: var(--navy); }
  .apparatus-score.empty { color: var(--text-light); }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 28px; text-align: center; color: var(--text-light); }
  .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
  .empty-title { font-size: 17px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; line-height: 1.6; max-width: 320px; }
  .no-results { background: #fff; border-radius: 10px; padding: 36px; text-align: center; color: var(--text-light); box-shadow: var(--shadow); }
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: relative; }
    .filters-bar, .results-area, .main-header, .active-filters { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Gymnastics</div>
      <div class="sidebar-subtitle">Competition Results</div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-competitions" onclick="switchTab('competitions')">Competitions</button>
      <button class="tab-btn" id="tab-league" onclick="switchTab('league')">League Table</button>
    </div>
    <div class="sidebar-status" id="sidebar-status">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Loading...</span>
    </div>
    <button class="refresh-btn" onclick="loadCompetitions()">↻ Refresh</button>
    <div id="sidebar-competitions">
      <div class="comp-list" id="comp-list"></div>
    </div>
    <div id="sidebar-league" style="display:none">
      <div class="league-info">
        <div class="league-info-title">National League Table</div>
        <div class="league-info-text">Each gymnast's best score per apparatus across all competitions. Total is the sum of their best scores.</div>
        <div class="league-stat"><div class="league-stat-num" id="league-gymnasts-num">—</div><div class="league-stat-lbl">Gymnasts</div></div>
        <div class="league-stat" style="margin-top:8px"><div class="league-stat-num" id="league-comps-num">—</div><div class="league-stat-lbl">Competitions</div></div>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state">
      <div class="empty-icon">🏅</div>
      <div class="empty-title">Loading competitions...</div>
      <div class="empty-sub">Fetching results from GitHub, please wait.</div>
    </div>
  </main>
</div>

<script>
var GITHUB_USER = "Davidcbrooke";
var GITHUB_REPO = "GYMNASTICS-RESULTS";
var BRANCH = "main";
var RAW_BASE = "https://raw.githubusercontent.com/" + GITHUB_USER + "/" + GITHUB_REPO + "/" + BRANCH + "/";
var API_BASE = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/";

var competitions = [];
var activeCompIdx = -1;
var activeTab = "competitions";
var compSortState = { apparatus: {}, dir: 1 };
var leagueSortCol = "total";
var leagueSortDir = 1; // will be flipped to -1 (highest first) on first render

function freshCompFilters() { return { gender:"ALL", apparatus:"ALL", ageCategory:"ALL", level:"ALL", country:"ALL", region:"ALL", trainingHrs:"ALL", memberSearch:"" }; }
function freshLeagueFilters() { return { gender:"ALL", apparatus:"ALL", ageCategory:"ALL", level:"ALL", country:"ALL", region:"ALL", trainingHrs:"ALL", memberSearch:"" }; }
var compFilters = freshCompFilters();
var leagueFilters = freshLeagueFilters();

function setStatus(state, msg) {
  document.getElementById("status-dot").className = "status-dot " + state;
  document.getElementById("status-text").textContent = msg;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("tab-competitions").className = "tab-btn" + (tab==="competitions" ? " active" : "");
  document.getElementById("tab-league").className = "tab-btn" + (tab==="league" ? " active" : "");
  document.getElementById("sidebar-competitions").style.display = tab==="competitions" ? "" : "none";
  document.getElementById("sidebar-league").style.display = tab==="league" ? "" : "none";
  if (tab === "league") renderLeague();
  else if (activeCompIdx >= 0) renderMain();
  else showWelcome();
}

function loadCompetitions() {
  setStatus("loading", "Loading competitions...");
  document.getElementById("comp-list").innerHTML = "";
  competitions = []; activeCompIdx = -1;
  fetch(API_BASE + "?ref=" + BRANCH, { headers: { "Accept": "application/vnd.github.v3+json" } })
    .then(function(r) { if (!r.ok) throw new Error("Status " + r.status); return r.json(); })
    .then(function(files) {
      var xlsxFiles = files.filter(function(f) { return f.type==="file" && f.name.toLowerCase().endsWith(".xlsx"); });
      if (!xlsxFiles.length) { setStatus("error","No result files found"); showWelcome(); return; }
      setStatus("loading","Loading " + xlsxFiles.length + " file" + (xlsxFiles.length!==1?"s":"") + "...");
      return Promise.all(xlsxFiles.map(function(f) { return loadXlsxFile(f.name); }));
    })
    .then(function(results) {
      if (!results) return;
      results.forEach(function(c) { if (c) competitions.push(c); });
      competitions.sort(function(a,b) { return b.date.localeCompare(a.date); });
      setStatus("ok", competitions.length + " competition" + (competitions.length!==1?"s":"") + " loaded");
      updateLeagueStats();
      renderSidebar();
      if (competitions.length) selectComp(0);
      else showWelcome();
    })
    .catch(function(err) { console.error(err); setStatus("error","Failed to load"); showWelcome(); });
}

function loadXlsxFile(filename) {
  return fetch(RAW_BASE + filename)
    .then(function(r) { if (!r.ok) throw new Error("Could not fetch " + filename); return r.arrayBuffer(); })
    .then(function(buf) {
      var wb = XLSX.read(new Uint8Array(buf), { type:"array" });
      var parsed = parseFilename(filename);
      var comp = { name:parsed.location, date:parsed.date, displayDate:parsed.displayDate, filename:filename, sheets:[], totalEntries:0 };
      wb.SheetNames.forEach(function(sn) {
        var rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { defval:"" });
        if (!rows.length) return;
        var entries = rows.map(function(r) {
          return {
            memberId: String(r["Member ID"]||r["BG Number"]||"").trim(),
            club: String(r["Club"]||"").trim(),
            ageCategory: String(r["Age Category"]||"").trim(),
            level: String(r["Level"]||"").trim(),
            score: r["Final Score"]!==undefined ? r["Final Score"] : (r["Score"]!==undefined ? r["Score"] : ""),
            country: String(r["Country"]||"").trim(),
            region: String(r["Region"]||"").trim(),
            trainingHrs: String(r["Training Hrs"]||r["Training Hours"]||"").trim(),
            gender: String(r["Gender"]||"").trim(),
          };
        }).filter(function(e) { return e.memberId||e.club; });
        if (entries.length) { comp.sheets.push({ apparatus:sn, entries:entries }); comp.totalEntries+=entries.length; }
      });
      return comp.sheets.length ? comp : null;
    })
    .catch(function(err) { console.warn("Skipping",filename,err); return null; });
}

function parseFilename(name) {
  var base = name.replace(/\.[^.]+$/,"");
  var m = base.match(/^(.+?)_(\d{4}-\d{2}-\d{2})/);
  if (m) {
    var loc = m[1].replace(/_/g," ");
    var d = m[2]; var parts = d.split("-");
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return { location:loc, date:d, displayDate:parts[2]+" "+months[parseInt(parts[1],10)-1]+" "+parts[0] };
  }
  return { location:base.replace(/_/g," "), date:"", displayDate:"" };
}

/* ── Collect filter options ── */
function collectAllOptions() {
  var g=new Set(), ap=new Set(), ac=new Set(), lv=new Set(), co=new Set(), re=new Set(), tr=new Set();
  competitions.forEach(function(comp) {
    comp.sheets.forEach(function(sh) {
      ap.add(sh.apparatus);
      sh.entries.forEach(function(e) {
        if (e.gender) g.add(e.gender);
        if (e.ageCategory) ac.add(e.ageCategory);
        if (e.level) lv.add(e.level);
        if (e.country) co.add(e.country);
        if (e.region) re.add(e.region);
        if (e.trainingHrs) tr.add(e.trainingHrs);
      });
    });
  });
  return { genders:arr(g), apparatuses:arr(ap), ageCategories:arr(ac), levels:arr(lv), countries:arr(co), regions:arr(re), trainingHrs:arr(tr) };
}
function collectCompOptions(comp) {
  var g=new Set(), ap=[], ac=new Set(), lv=new Set(), co=new Set(), re=new Set(), tr=new Set();
  comp.sheets.forEach(function(sh) {
    ap.push(sh.apparatus);
    sh.entries.forEach(function(e) {
      if (e.gender) g.add(e.gender);
      if (e.ageCategory) ac.add(e.ageCategory);
      if (e.level) lv.add(e.level);
      if (e.country) co.add(e.country);
      if (e.region) re.add(e.region);
      if (e.trainingHrs) tr.add(e.trainingHrs);
    });
  });
  return { genders:arr(g), apparatuses:ap, ageCategories:arr(ac), levels:arr(lv), countries:arr(co), regions:arr(re), trainingHrs:arr(tr) };
}
function arr(s) { return Array.from(s).sort(); }

/* ── Active filter tags ── */
var FILTER_LABELS = { gender:"Gender", apparatus:"Apparatus", ageCategory:"Age Category", level:"Level", country:"Country", region:"Region", trainingHrs:"Training Hrs" };

function activeTagsHtml(f, removeFn) {
  var tags = [];
  Object.keys(FILTER_LABELS).forEach(function(k) {
    if (f[k] && f[k] !== "ALL") tags.push({ key:k, label:FILTER_LABELS[k]+": "+f[k] });
  });
  if (f.memberSearch) tags.push({ key:"memberSearch", label:"Member ID: "+f.memberSearch });
  if (!tags.length) return "";
  return '<div class="active-filters"><span class="active-filters-label">Filtered by</span>' +
    tags.map(function(t) { return '<span class="filter-tag">'+esc(t.label)+'<button onclick="'+removeFn+'(\''+t.key+'\')">×</button></span>'; }).join("") +
    '</div>';
}

/* ── Filter select builder ── */
function fSelect(key, label, options, currentVal, onchangeFn) {
  if (!options || options.length <= 1) return "";
  var s = '<div class="filter-group"><label class="filter-label">'+label+'</label><select class="filter-select" onchange="'+onchangeFn+'(\''+key+'\',this.value)">';
  var allLabel = label==="Apparatus" ? "All Apparatus" : label==="Training Hrs" ? "All Training Hrs" : "All "+label+"s";
  s += '<option value="ALL">'+allLabel+'</option>';
  options.forEach(function(o) { if (o) s += '<option value="'+esc(o)+'"'+(currentVal===o?' selected':'')+'>'+esc(o)+'</option>'; });
  s += '</select></div>';
  return s;
}

/* ── League ── */
function updateLeagueStats() {
  var data = buildLeagueData(freshLeagueFilters());
  document.getElementById("league-gymnasts-num").textContent = data.rows.length;
  document.getElementById("league-comps-num").textContent = competitions.length;
}

function buildLeagueData(f) {
  var gymnasts = {};
  var apparatusSet = new Set();
  competitions.forEach(function(comp) {
    comp.sheets.forEach(function(sh) {
      sh.entries.forEach(function(e) {
        if (!e.memberId) return;
        if (f.gender && f.gender!=="ALL" && e.gender!==f.gender) return;
        if (f.ageCategory && f.ageCategory!=="ALL" && e.ageCategory!==f.ageCategory) return;
        if (f.level && f.level!=="ALL" && e.level!==f.level) return;
        if (f.country && f.country!=="ALL" && e.country!==f.country) return;
        if (f.region && f.region!=="ALL" && e.region!==f.region) return;
        if (f.trainingHrs && f.trainingHrs!=="ALL" && e.trainingHrs!==f.trainingHrs) return;
        if (f.memberSearch && e.memberId.toLowerCase().indexOf(f.memberSearch.toLowerCase())<0) return;
        var score = parseFloat(e.score);
        if (isNaN(score)) return;
        if (!gymnasts[e.memberId]) {
          gymnasts[e.memberId] = { memberId:e.memberId, club:e.club, ageCategory:e.ageCategory, level:e.level, country:e.country, region:e.region, trainingHrs:e.trainingHrs, gender:e.gender, scores:{}, total:0 };
        }
        var g = gymnasts[e.memberId];
        if (e.club) g.club=e.club; if (e.ageCategory) g.ageCategory=e.ageCategory;
        if (e.level) g.level=e.level; if (e.country) g.country=e.country;
        if (e.region) g.region=e.region; if (e.trainingHrs) g.trainingHrs=e.trainingHrs;
        if (e.gender) g.gender=e.gender;
        if (!g.scores[sh.apparatus] || score > g.scores[sh.apparatus]) g.scores[sh.apparatus] = score;
        apparatusSet.add(sh.apparatus);
      });
    });
  });
  var allApparatus = Array.from(apparatusSet).sort();
  if (f.apparatus && f.apparatus!=="ALL") {
    allApparatus = [f.apparatus];
    Object.keys(gymnasts).forEach(function(id) { if (!gymnasts[id].scores[f.apparatus]) delete gymnasts[id]; });
  }
  var rows = Object.values(gymnasts);
  rows.forEach(function(g) {
    g.total = 0;
    allApparatus.forEach(function(a) { g.total += g.scores[a]||0; });
    g.total = Math.round(g.total*1000)/1000;
  });
  return { rows:rows, apparatus:allApparatus };
}

function renderLeague() {
  var main = document.getElementById("main");
  if (!competitions.length) { showWelcome(); return; }
  var opts = collectAllOptions();
  var data = buildLeagueData(leagueFilters);
  var rows = data.rows;
  var apparatus = data.apparatus;

  // Sort — highest total first by default
  rows.sort(function(a,b) {
    var col = leagueSortCol; var dir = leagueSortDir;
    if (col==="total") return (b.total - a.total);
    if (apparatus.indexOf(col)>=0) return ((b.scores[col]||0)-(a.scores[col]||0))*dir;
    return String(a[col]||"").localeCompare(String(b[col]||""))*dir;
  });

  var html = '<div class="main-header"><div class="main-title">National League Table</div>' +
    '<div class="main-meta">'+rows.length+' gymnasts · '+competitions.length+' competitions · Best score per apparatus</div></div>';

  html += '<div class="filters-bar">' +
    fSelect("gender","Gender",opts.genders,leagueFilters.gender,"setLeagueFilter") +
    fSelect("apparatus","Apparatus",opts.apparatuses,leagueFilters.apparatus,"setLeagueFilter") +
    fSelect("ageCategory","Age Category",opts.ageCategories,leagueFilters.ageCategory,"setLeagueFilter") +
    fSelect("level","Level",opts.levels,leagueFilters.level,"setLeagueFilter") +
    fSelect("country","Country",opts.countries,leagueFilters.country,"setLeagueFilter") +
    fSelect("region","Region",opts.regions,leagueFilters.region,"setLeagueFilter") +
    fSelect("trainingHrs","Training Hrs",opts.trainingHrs,leagueFilters.trainingHrs,"setLeagueFilter") +
    '<div class="filter-group"><label class="filter-label">Member ID</label><input class="filter-search" placeholder="Search ID..." value="'+esc(leagueFilters.memberSearch)+'" oninput="leagueFilters.memberSearch=this.value;renderLeague()"/></div>' +
    '<button class="clear-btn" onclick="clearLeagueFilters()">Clear All</button></div>';

  html += activeTagsHtml(leagueFilters, "removeLeagueFilter");
  html += '<div class="results-area">';

  if (!rows.length) {
    html += '<div class="no-results"><strong>No gymnasts match your filters.</strong><br/><span style="font-size:13px;color:#8a96a8">Try adjusting or clearing the filters above.</span></div>';
  } else {
    html += '<div class="results-summary">Showing <span>'+rows.length+'</span> gymnast'+(rows.length!==1?'s':'')+'</div>';
    html += '<table class="results-table"><thead><tr><th style="width:36px">#</th>';
    html += lth("memberId","Member ID")+lth("club","Club")+lth("gender","Gender")+lth("ageCategory","Age Cat.")+lth("level","Level")+lth("country","Country")+lth("region","Region")+lth("trainingHrs","Training Hrs");
    apparatus.forEach(function(a) { html += lth(a,a); });
    html += lth("total","Total")+'</tr></thead><tbody>';
    rows.forEach(function(g,i) {
      var rank=i+1; var rc=rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"";
      html += '<tr><td class="rank-cell '+rc+'">'+rank+'</td>';
      html += '<td class="member-cell">'+esc(g.memberId||"—")+'</td>';
      html += '<td>'+esc(g.club||"—")+'</td>';
      html += '<td><span class="badge"><span>'+esc(g.gender||"—")+'</span></span></td>';
      html += '<td><span class="badge"><span>'+esc(g.ageCategory||"—")+'</span></span></td>';
      html += '<td><span class="badge"><span>'+esc(g.level||"—")+'</span></span></td>';
      html += '<td>'+esc(g.country||"—")+'</td><td>'+esc(g.region||"—")+'</td><td>'+esc(g.trainingHrs||"—")+'</td>';
      apparatus.forEach(function(a) {
        var s=g.scores[a];
        html += s!==undefined ? '<td class="apparatus-score best">'+parseFloat(s).toFixed(3)+'</td>' : '<td class="apparatus-score empty">—</td>';
      });
      html += '<td class="total-cell">'+g.total.toFixed(3)+'</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  main.innerHTML = html;
}

function lth(col, label) {
  var sorted = leagueSortCol===col;
  var icon = sorted ? (leagueSortDir===-1?" ↓":" ↑") : " ↕";
  return '<th class="'+(sorted?"sorted":"")+'" onclick="doLeagueSort(\''+col+'\')">'+esc(label)+'<span class="sort-icon">'+icon+'</span></th>';
}
function doLeagueSort(col) {
  if (leagueSortCol===col) leagueSortDir = leagueSortDir===1?-1:1;
  else { leagueSortCol=col; leagueSortDir=-1; }
  renderLeague();
}
function setLeagueFilter(key,val) { leagueFilters[key]=val; renderLeague(); }
function clearLeagueFilters() { leagueFilters=freshLeagueFilters(); renderLeague(); }
function removeLeagueFilter(key) { if(key==="memberSearch")leagueFilters.memberSearch=""; else leagueFilters[key]="ALL"; renderLeague(); }

/* ── Competition results ── */
function renderSidebar() {
  var el = document.getElementById("comp-list");
  if (!competitions.length) { el.innerHTML='<div class="no-comps">No competitions found.</div>'; return; }
  el.innerHTML = competitions.map(function(c,i) {
    return '<div class="comp-item'+(i===activeCompIdx?" active":"")+'" onclick="selectComp('+i+')">' +
      '<div class="comp-name">'+esc(c.name)+'</div>' +
      (c.displayDate?'<div class="comp-date">'+esc(c.displayDate)+'</div>':'') +
      '<div class="comp-count">'+c.totalEntries+' entries · '+c.sheets.length+' apparatus</div></div>';
  }).join("");
}

function selectComp(idx) {
  activeCompIdx=idx; compSortState={apparatus:{},dir:1}; compFilters=freshCompFilters();
  renderSidebar();
  if (activeTab==="competitions") renderMain();
}

function renderMain() {
  var main = document.getElementById("main");
  if (activeCompIdx<0||!competitions[activeCompIdx]) { showWelcome(); return; }
  var comp = competitions[activeCompIdx];
  var opts = collectCompOptions(comp);
  var html = '<div class="main-header"><div class="main-title">'+esc(comp.name)+'</div>' +
    (comp.displayDate?'<div class="main-meta">'+esc(comp.displayDate)+' · '+comp.totalEntries+' entries</div>':'<div class="main-meta">'+comp.totalEntries+' entries</div>')+
    '</div>';
  html += '<div class="filters-bar">' +
    fSelect("gender","Gender",opts.genders,compFilters.gender,"setCompFilter") +
    fSelect("apparatus","Apparatus",opts.apparatuses,compFilters.apparatus,"setCompFilter") +
    fSelect("ageCategory","Age Category",opts.ageCategories,compFilters.ageCategory,"setCompFilter") +
    fSelect("level","Level",opts.levels,compFilters.level,"setCompFilter") +
    fSelect("country","Country",opts.countries,compFilters.country,"setCompFilter") +
    fSelect("region","Region",opts.regions,compFilters.region,"setCompFilter") +
    fSelect("trainingHrs","Training Hrs",opts.trainingHrs,compFilters.trainingHrs,"setCompFilter") +
    '<div class="filter-group"><label class="filter-label">Member ID</label><input class="filter-search" placeholder="Search ID..." value="'+esc(compFilters.memberSearch)+'" oninput="compFilters.memberSearch=this.value;renderCompResults()"/></div>' +
    '<button class="clear-btn" onclick="clearCompFilters()">Clear All</button></div>';
  html += '<div id="active-filters-bar"></div>';
  html += '<div class="results-area" id="results-area"></div>';
  main.innerHTML = html;
  renderCompResults();
}

function renderCompResults() {
  var comp = competitions[activeCompIdx];
  var afBar = document.getElementById("active-filters-bar");
  if (afBar) afBar.outerHTML = activeTagsHtml(compFilters,"removeCompFilter") || '<div id="active-filters-bar"></div>';

  var sheets = comp.sheets;
  if (compFilters.apparatus && compFilters.apparatus!=="ALL") sheets=sheets.filter(function(s){return s.apparatus===compFilters.apparatus;});
  var totalVisible=0; var html="";

  sheets.forEach(function(sh) {
    var entries = sh.entries.filter(function(e) {
      if (compFilters.gender && compFilters.gender!=="ALL" && e.gender!==compFilters.gender) return false;
      if (compFilters.ageCategory && compFilters.ageCategory!=="ALL" && e.ageCategory!==compFilters.ageCategory) return false;
      if (compFilters.level && compFilters.level!=="ALL" && e.level!==compFilters.level) return false;
      if (compFilters.country && compFilters.country!=="ALL" && e.country!==compFilters.country) return false;
      if (compFilters.region && compFilters.region!=="ALL" && e.region!==compFilters.region) return false;
      if (compFilters.trainingHrs && compFilters.trainingHrs!=="ALL" && e.trainingHrs!==compFilters.trainingHrs) return false;
      if (compFilters.memberSearch && e.memberId.toLowerCase().indexOf(compFilters.memberSearch.toLowerCase())<0) return false;
      return true;
    });
    if (!entries.length) return;
    var sk = compSortState.apparatus[sh.apparatus];
    if (sk) {
      entries=entries.slice().sort(function(a,b){
        if(sk==="score") return ((parseFloat(b.score)||0)-(parseFloat(a.score)||0))*(compSortState.dir||1);
        return String(a[sk]||"").localeCompare(String(b[sk]||""))*(compSortState.dir||1);
      });
    } else {
      entries=entries.slice().sort(function(a,b){return (parseFloat(b.score)||0)-(parseFloat(a.score)||0);});
    }
    totalVisible+=entries.length;
    html+='<div class="apparatus-section"><div class="apparatus-header"><span class="apparatus-name">'+esc(sh.apparatus)+'</span><span class="apparatus-count">'+entries.length+' results</span></div>' +
      '<table class="results-table"><thead><tr><th style="width:36px">#</th>' +
      cth(sh.apparatus,"memberId","Member ID")+cth(sh.apparatus,"club","Club")+
      cth(sh.apparatus,"ageCategory","Age Cat.")+cth(sh.apparatus,"level","Level")+
      cth(sh.apparatus,"country","Country")+cth(sh.apparatus,"region","Region")+
      cth(sh.apparatus,"trainingHrs","Training Hrs")+cth(sh.apparatus,"score","Score")+
      '</tr></thead><tbody>';
    entries.forEach(function(e,i){
      var rank=i+1; var rc=rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"";
      var sv=parseFloat(e.score); var sd=!isNaN(sv)?sv.toFixed(3):(e.score||"—");
      html+='<tr><td class="rank-cell '+rc+'">'+rank+'</td><td class="member-cell">'+esc(e.memberId||"—")+'</td><td>'+esc(e.club||"—")+'</td>' +
        '<td><span class="badge"><span>'+esc(e.ageCategory||"—")+'</span></span></td>' +
        '<td><span class="badge"><span>'+esc(e.level||"—")+'</span></span></td>' +
        '<td>'+esc(e.country||"—")+'</td><td>'+esc(e.region||"—")+'</td><td>'+esc(e.trainingHrs||"—")+'</td>' +
        '<td class="score-cell">'+sd+'</td></tr>';
    });
    html+='</tbody></table></div>';
  });

  var area=document.getElementById("results-area");
  if (!area) return;
  if (!totalVisible) { area.innerHTML='<div class="no-results"><strong>No results match your filters.</strong><br/><span style="font-size:13px;color:#8a96a8">Try adjusting or clearing the filters above.</span></div>'; return; }
  area.innerHTML='<div class="results-summary">Showing <span>'+totalVisible+'</span> result'+(totalVisible!==1?'s':'')+'</div>'+html;
}

function cth(apparatus,col,label){
  var sorted=compSortState.apparatus[apparatus]===col;
  var icon=sorted?(compSortState.dir===1?" ↑":" ↓"):" ↕";
  return '<th class="'+(sorted?"sorted":"")+'" onclick="doCompSort(\''+apparatus+'\',\''+col+'\')">'+label+'<span class="sort-icon">'+icon+'</span></th>';
}
function doCompSort(apparatus,col){
  if(compSortState.apparatus[apparatus]===col)compSortState.dir=compSortState.dir===1?-1:1;
  else{compSortState.apparatus[apparatus]=col;compSortState.dir=col==="score"?-1:1;}
  renderCompResults();
}
function setCompFilter(key,val) { compFilters[key]=val; renderMain(); }
function clearCompFilters(){compFilters=freshCompFilters();renderMain();}
function removeCompFilter(key){if(key==="memberSearch")compFilters.memberSearch="";else compFilters[key]="ALL";renderMain();}

function showWelcome(){
  document.getElementById("main").innerHTML='<div class="empty-state"><div class="empty-icon">🏅</div><div class="empty-title">No competition selected</div><div class="empty-sub">Select a competition from the left, or click League Table for national standings.</div></div>';
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

loadCompetitions();
</script>
</body>
</html>
