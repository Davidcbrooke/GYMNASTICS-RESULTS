<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Competition Results</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a2340; --accent: #c8102e; --accent-light: rgba(200,16,46,0.08);
    --gold: #b8972a; --off-white: #f7f8fa; --border: #e2e6ed;
    --text: #1a2340; --text-mid: #4a5568; --text-light: #8a96a8;
    --shadow: 0 2px 12px rgba(26,35,64,0.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--off-white); color: var(--text); min-height: 100vh; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; min-width: 260px; background: var(--navy); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-title { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .sidebar-subtitle { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.3; }
  .tab-bar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .tab-btn { flex: 1; padding: 10px 8px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; text-align: center; }
  .tab-btn:hover { color: rgba(255,255,255,0.7); }
  .tab-btn.active { color: #fff; border-bottom-color: var(--accent); }
  .sidebar-status { padding: 10px 14px; margin: 10px 14px 0; background: rgba(255,255,255,0.06); border-radius: 8px; font-size: 12px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.loading { background: #FFB800; animation: pulse 1s infinite; }
  .status-dot.ok { background: #22c55e; }
  .status-dot.error { background: var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .refresh-btn { margin: 8px 14px 0; padding: 8px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; width: calc(100% - 28px); transition: all 0.15s; }
  .refresh-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .comp-list { padding: 8px 0; flex: 1; }
  .comp-item { padding: 10px 20px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .comp-item:hover { background: rgba(255,255,255,0.05); }
  .comp-item.active { background: rgba(255,255,255,0.08); border-left-color: var(--accent); }
  .comp-name { font-size: 13px; font-weight: 600; color: #fff; }
  .comp-date { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .comp-count { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
  .no-comps { padding: 20px; text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; line-height: 1.6; }
  .league-info { padding: 16px 20px; flex: 1; }
  .league-info-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .league-info-text { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.7; }
  .league-stat { margin-top: 16px; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 12px 14px; }
  .league-stat-num { font-size: 24px; font-weight: 800; color: #fff; }
  .league-stat-lbl { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .main-header { background: #fff; border-bottom: 1px solid var(--border); padding: 20px 28px; box-shadow: var(--shadow); }
  .main-title { font-size: 20px; font-weight: 700; color: var(--navy); }
  .main-meta { font-size: 13px; color: var(--text-light); margin-top: 3px; }
  .filters-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-label { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; }
  .filter-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--text); background: var(--off-white); outline: none; cursor: pointer; min-width: 120px; max-width: 170px; }
  .filter-select:focus { border-color: var(--navy); }
  .filter-search { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--text); background: var(--off-white); outline: none; min-width: 150px; }
  .filter-search:focus { border-color: var(--navy); }
  .filter-search::placeholder { color: var(--text-light); }
  .clear-btn { padding: 7px 14px; background: transparent; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-mid); cursor: pointer; align-self: flex-end; transition: all 0.15s; }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
  .active-filters { padding: 8px 28px; background: var(--accent-light); border-bottom: 1px solid rgba(200,16,46,0.12); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .active-filters-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
  .filter-tag { display: inline-flex; align-items: center; gap: 5px; background: #fff; border: 1px solid rgba(200,16,46,0.2); border-radius: 20px; padding: 3px 10px 3px 12px; font-size: 12px; font-weight: 500; color: var(--navy); }
  .filter-tag button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 14px; line-height: 1; padding: 0; }
  .results-area { flex: 1; overflow-y: auto; padding: 20px 28px; }
  .results-summary { font-size: 13px; color: var(--text-light); margin-bottom: 14px; font-weight: 500; }
  .results-summary span { color: var(--navy); font-weight: 700; }
  .apparatus-section { margin-bottom: 28px; }
  .apparatus-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--navy); }
  .apparatus-name { font-size: 15px; font-weight: 700; color: var(--navy); }
  .apparatus-count { font-size: 12px; font-weight: 600; color: var(--text-light); background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; }
  .results-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
  .results-table thead tr { background: var(--navy); }
  .results-table th { padding: 10px 13px; text-align: left; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; cursor: pointer; user-select: none; }
  .results-table th:hover { color: #fff; }
  .results-table th.sorted { color: #fff; }
  .results-table th .sort-icon { margin-left: 4px; opacity: 0.5; }
  .results-table th.sorted .sort-icon { opacity: 1; color: var(--gold); }
  .results-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .results-table tbody tr:last-child { border-bottom: none; }
  .results-table tbody tr:hover { background: var(--off-white); }
  .results-table td { padding: 10px 13px; font-size: 13px; color: var(--text); }
  .rank-cell { font-weight: 700; color: var(--text-light); font-size: 12px; width: 36px; }
  .rank-1 { color: #b8972a; } .rank-2 { color: #8a9399; } .rank-3 { color: #a0634a; }
  .score-cell { font-weight: 700; color: var(--navy); font-size: 14px; }
  .total-cell { font-weight: 800; color: var(--accent); font-size: 15px; }
  .member-cell { font-family: monospace; font-size: 12px; color: var(--text-mid); }
  .member-link { font-family: monospace; font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; font-weight: 600; }
  .member-link:hover { color: var(--navy); }
  .search-mode-toggle { display: flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; align-self: flex-end; }
  .search-mode-btn { padding: 7px 12px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; background: var(--off-white); color: var(--text-light); }
  .search-mode-btn.active { background: var(--navy); color: #fff; }
  tr.highlighted-row td { background: rgba(200,16,46,0.08) !important; border-left: 3px solid var(--accent); }
  tr.highlighted-row .member-link { color: var(--accent); font-weight: 800; }
  .badge span { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(26,35,64,0.06); color: var(--navy); }
  .apparatus-score { text-align: center; }
  .apparatus-score.best { font-weight: 700; color: var(--navy); }
  .apparatus-score.empty { color: var(--text-light); }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 28px; text-align: center; color: var(--text-light); }
  .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
  .empty-title { font-size: 17px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; line-height: 1.6; max-width: 320px; }
  .no-results { background: #fff; border-radius: 10px; padding: 36px; text-align: center; color: var(--text-light); box-shadow: var(--shadow); }

  /* ── Profile Popup ── */
  .profile-overlay { position: fixed; inset: 0; background: rgba(26,35,64,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .profile-modal { background: #fff; border-radius: 16px; width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(26,35,64,0.3); }
  .profile-header { background: var(--navy); padding: 24px 28px; border-radius: 16px 16px 0 0; display: flex; align-items: flex-start; justify-content: space-between; }
  .profile-id { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .profile-club { font-size: 20px; font-weight: 700; color: #fff; }
  .profile-close { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .profile-close:hover { background: rgba(255,255,255,0.2); }
  .profile-body { padding: 24px 28px; }

  /* Profile details pills */
  .profile-details { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .profile-pill { display: inline-flex; flex-direction: column; background: var(--off-white); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; }
  .profile-pill-label { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
  .profile-pill-value { font-size: 13px; font-weight: 600; color: var(--navy); }

  /* Profile sections */
  .profile-section { margin-bottom: 24px; }
  .profile-section-title { font-size: 13px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--navy); }

  /* Best scores grid */
  .best-scores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .best-score-card { background: var(--off-white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-align: center; }
  .best-score-apparatus { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .best-score-value { font-size: 20px; font-weight: 800; color: var(--navy); }
  .best-score-card.top { border-color: var(--gold); background: rgba(184,151,42,0.06); }
  .best-score-card.top .best-score-value { color: var(--gold); }

  /* All results table */
  .profile-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .profile-table th { padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; border-bottom: 1px solid var(--border); }
  .profile-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  .profile-table tr:last-child td { border-bottom: none; }
  .profile-table tr:hover td { background: var(--off-white); }
  .profile-table .best-marker { color: var(--gold); font-weight: 700; font-size: 11px; margin-left: 4px; }

  /* Chart */
  .chart-wrap { position: relative; height: 180px; margin-top: 4px; }
  canvas { width: 100% !important; }

  /* Total row */
  .total-row { background: var(--navy); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .total-row-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.7); }
  .total-row-value { font-size: 22px; font-weight: 800; color: #fff; }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: relative; }
    .filters-bar, .results-area, .main-header, .active-filters { padding-left: 16px; padding-right: 16px; }
    .profile-modal { max-height: 95vh; }
    .profile-body { padding: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Gymnastics</div>
      <div class="sidebar-subtitle">Competition Results</div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-competitions" onclick="switchTab('competitions')">Competitions</button>
      <button class="tab-btn" id="tab-league" onclick="switchTab('league')">League Table</button>
    </div>
    <div class="sidebar-status" id="sidebar-status">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Loading...</span>
    </div>
    <button class="refresh-btn" onclick="loadCompetitions()">↻ Refresh</button>
    <div id="sidebar-competitions">
      <div class="comp-list" id="comp-list"></div>
    </div>
    <div id="sidebar-league" style="display:none">
      <div class="league-info">
        <div class="league-info-title">National League Table</div>
        <div class="league-info-text">Each gymnast's best score per apparatus across all competitions. Total is the sum of their best scores.</div>
        <div class="league-stat"><div class="league-stat-num" id="league-gymnasts-num">—</div><div class="league-stat-lbl">Gymnasts</div></div>
        <div class="league-stat" style="margin-top:8px"><div class="league-stat-num" id="league-comps-num">—</div><div class="league-stat-lbl">Competitions</div></div>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state">
      <div class="empty-icon">🏅</div>
      <div class="empty-title">Loading competitions...</div>
      <div class="empty-sub">Fetching results from GitHub, please wait.</div>
    </div>
  </main>
</div>

<!-- Profile Popup -->
<div class="profile-overlay" id="profile-overlay" style="display:none" onclick="closeProfile(event)">
  <div class="profile-modal" id="profile-modal"></div>
</div>

<script>
var GITHUB_USER = "Davidcbrooke";
var GITHUB_REPO = "GYMNASTICS-RESULTS";
var BRANCH = "main";
var RAW_BASE = "https://raw.githubusercontent.com/" + GITHUB_USER + "/" + GITHUB_REPO + "/" + BRANCH + "/";
var API_BASE = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/";

var competitions = [];
var activeCompIdx = -1;
var activeTab = "competitions";
var compSortState = { apparatus: {}, dir: 1 };
var leagueSortCol = "total";
var leagueSortDir = -1;

function freshCompFilters() { return { gender:"ALL", apparatus:"ALL", ageCategory:"ALL", level:"ALL", country:"ALL", region:"ALL", trainingHrs:"ALL", memberSearch:"", memberSearchMode:"filter" }; }
function freshLeagueFilters() { return { gender:"ALL", apparatus:"ALL", ageCategory:"ALL", level:"ALL", country:"ALL", region:"ALL", trainingHrs:"ALL", memberSearch:"", memberSearchMode:"filter" }; }
var compFilters = freshCompFilters();
var leagueFilters = freshLeagueFilters();

function setStatus(state, msg) {
  document.getElementById("status-dot").className = "status-dot " + state;
  document.getElementById("status-text").textContent = msg;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("tab-competitions").className = "tab-btn" + (tab==="competitions" ? " active" : "");
  document.getElementById("tab-league").className = "tab-btn" + (tab==="league" ? " active" : "");
  document.getElementById("sidebar-competitions").style.display = tab==="competitions" ? "" : "none";
  document.getElementById("sidebar-league").style.display = tab==="league" ? "" : "none";
  if (tab === "league") renderLeague();
  else if (activeCompIdx >= 0) renderMain();
  else showWelcome();
}

function loadCompetitions() {
  setStatus("loading", "Loading competitions...");
  document.getElementById("comp-list").innerHTML = "";
  competitions = []; activeCompIdx = -1;
  fetch(API_BASE + "?ref=" + BRANCH, { headers: { "Accept": "application/vnd.github.v3+json" } })
    .then(function(r) { if (!r.ok) throw new Error("Status " + r.status); return r.json(); })
    .then(function(files) {
      var xlsxFiles = files.filter(function(f) { return f.type==="file" && f.name.toLowerCase().endsWith(".xlsx"); });
      if (!xlsxFiles.length) { setStatus("error","No result files found"); showWelcome(); return; }
      setStatus("loading","Loading " + xlsxFiles.length + " file" + (xlsxFiles.length!==1?"s":"") + "...");
      return Promise.all(xlsxFiles.map(function(f) { return loadXlsxFile(f.name); }));
    })
    .then(function(results) {
      if (!results) return;
      results.forEach(function(c) { if (c) competitions.push(c); });
      competitions.sort(function(a,b) { return b.date.localeCompare(a.date); });
      setStatus("ok", competitions.length + " competition" + (competitions.length!==1?"s":"") + " loaded");
      updateLeagueStats();
      renderSidebar();
      if (competitions.length) selectComp(0);
      else showWelcome();
    })
    .catch(function(err) { console.error(err); setStatus("error","Failed to load"); showWelcome(); });
}

function loadXlsxFile(filename) {
  return fetch(RAW_BASE + filename)
    .then(function(r) { if (!r.ok) throw new Error("Could not fetch " + filename); return r.arrayBuffer(); })
    .then(function(buf) {
      var wb = XLSX.read(new Uint8Array(buf), { type:"array" });
      var parsed = parseFilename(filename);
      var comp = { name:parsed.location, date:parsed.date, displayDate:parsed.displayDate, filename:filename, sheets:[], totalEntries:0 };
      wb.SheetNames.forEach(function(sn) {
        var rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { defval:"" });
        if (!rows.length) return;
        var entries = rows.map(function(r) {
          return {
            memberId: String(r["Member ID"]||r["BG Number"]||"").trim(),
            club: String(r["Club"]||"").trim(),
            ageCategory: String(r["Age Category"]||r["AgeCategory"]||"").trim(),
            level: String(r["Level"]||"").trim(),
            score: r["Final Score"]!==undefined ? r["Final Score"] : (r["FinalScore"]!==undefined ? r["FinalScore"] : (r["Score"]!==undefined ? r["Score"] : "")),
            country: String(r["Country"]||"").trim(),
            region: String(r["Region"]||"").trim(),
            trainingHrs: String(r["Training Hrs"]||r["TrainingHrs"]||r["Training Hours"]||"").trim(),
            gender: String(r["Gender"]||"").trim(),
          };
        }).filter(function(e) { return e.memberId||e.club; });
        if (entries.length) { comp.sheets.push({ apparatus:sn, entries:entries }); comp.totalEntries+=entries.length; }
      });
      return comp.sheets.length ? comp : null;
    })
    .catch(function(err) { console.warn("Skipping",filename,err); return null; });
}

function parseFilename(name) {
  var base = name.replace(/\.[^.]+$/,"");
  var m = base.match(/^(.+?)_(\d{4}-\d{2}-\d{2})/);
  if (m) {
    var loc = m[1].replace(/_/g," ");
    var d = m[2]; var parts = d.split("-");
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return { location:loc, date:d, displayDate:parts[2]+" "+months[parseInt(parts[1],10)-1]+" "+parts[0] };
  }
  return { location:base.replace(/_/g," "), date:"", displayDate:"" };
}

/* ── Gymnast Profile ── */
function openProfile(memberId) {
  // Gather all results for this gymnast across all competitions
  var info = { memberId:memberId, club:"", ageCategory:"", level:"", country:"", region:"", trainingHrs:"", gender:"" };
  var allResults = []; // { competition, date, displayDate, apparatus, score }
  var bestScores = {}; // apparatus -> best score

  competitions.forEach(function(comp) {
    comp.sheets.forEach(function(sh) {
      sh.entries.forEach(function(e) {
        if (e.memberId !== memberId) return;
        // Update info with latest values
        if (e.club) info.club = e.club;
        if (e.ageCategory) info.ageCategory = e.ageCategory;
        if (e.level) info.level = e.level;
        if (e.country) info.country = e.country;
        if (e.region) info.region = e.region;
        if (e.trainingHrs) info.trainingHrs = e.trainingHrs;
        if (e.gender) info.gender = e.gender;
        var score = parseFloat(e.score);
        if (!isNaN(score)) {
          allResults.push({ competition:comp.name, date:comp.date, displayDate:comp.displayDate, apparatus:sh.apparatus, score:score });
          if (!bestScores[sh.apparatus] || score > bestScores[sh.apparatus]) bestScores[sh.apparatus] = score;
        }
      });
    });
  });

  // Sort results by date then apparatus
  allResults.sort(function(a,b) { return a.date.localeCompare(b.date) || a.apparatus.localeCompare(b.apparatus); });

  // Total
  var total = 0;

  // Build score progression per apparatus (for chart)
  var apparatuses = Object.keys(bestScores).sort();
  var progressionByApparatus = {};
  apparatuses.forEach(function(a) {
    progressionByApparatus[a] = allResults.filter(function(r) { return r.apparatus===a; }).map(function(r) { return { date:r.displayDate, score:r.score }; });
  });

  // Build HTML

    '<button class="profile-close" onclick="closeProfile()">×</button></div>';

  html += '<div class="profile-details">';
  if (info.gender) html += pill("Gender", info.gender);
  if (info.ageCategory) html += pill("Age Category", info.ageCategory);
  if (info.level) html += pill("Level", info.level);
  if (info.country) html += pill("Country", info.country);
  if (info.region) html += pill("Region", info.region);
  if (info.trainingHrs) html += pill("Training Hrs", info.trainingHrs);
  html += pill("Competitions", allResults.length > 0 ? [...new Set(allResults.map(function(r){return r.competition;}))].length + "" : "0");
  html += '</div>';

  // Total
  html += '<div class="total-row"><div class="total-row-label">Total Score (Best per Apparatus)</div><div class="total-row-value">'+total.toFixed(3)+'</div></div>';

  // Best scores
  html += '<div class="profile-section"><div class="profile-section-title">Best Scores per Apparatus</div>';
  html += '<div class="best-scores-grid">';
  var maxScore = Math.max.apply(null, Object.values(bestScores));
  apparatuses.forEach(function(a) {
    var isTop = bestScores[a] === maxScore;
    html += '<div class="best-score-card'+(isTop?' top':'')+'"><div class="best-score-apparatus">'+esc(a)+'</div><div class="best-score-value">'+bestScores[a].toFixed(3)+'</div></div>';
  });
  html += '</div></div>';

  // Score progression chart
  if (allResults.length > 1) {
    html += '<div class="profile-section"><div class="profile-section-title">Score Progression</div>';
    html += '<div class="chart-wrap"><canvas id="profile-chart"></canvas></div></div>';
  }

  // All results
  html += '<div class="profile-section"><div class="profile-section-title">All Results</div>';
  html += '<table class="profile-table"><thead><tr><th>Competition</th><th>Date</th><th>Apparatus</th><th>Score</th></tr></thead><tbody>';
  allResults.forEach(function(r) {
    var isBest = bestScores[r.apparatus] === r.score;
    html += '<tr><td>'+esc(r.competition)+'</td><td>'+esc(r.displayDate||r.date)+'</td><td>'+esc(r.apparatus)+'</td>' +
      '<td><strong>'+r.score.toFixed(3)+'</strong>'+(isBest?'<span class="best-marker">★ Best</span>':'')+'</td></tr>';
  });
  html += '</tbody></table></div>';
  html += '</div>'; // profile-body

  var modal = document.getElementById("profile-modal");
  modal.innerHTML = html;
  document.getElementById("profile-overlay").style.display = "flex";
  document.body.style.overflow = "hidden";

  // Draw chart if needed
  if (allResults.length > 1) {
    setTimeout(function() { drawChart(progressionByApparatus, apparatuses); }, 50);
  }
}

function pill(label, value) {
  return '<div class="profile-pill"><div class="profile-pill-label">'+esc(label)+'</div><div class="profile-pill-value">'+esc(value)+'</div></div>';
}

function drawChart(progressionByApparatus, apparatuses) {
  var canvas = document.getElementById("profile-chart");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.parentElement.clientWidth;
  var h = 180;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + "px"; canvas.style.height = h + "px";
  ctx.scale(dpr, dpr);

  var colors = ["#c8102e","#1a2340","#b8972a","#22c55e","#8b5cf6","#f97316"];
  var pad = { top:16, right:16, bottom:40, left:48 };
  var chartW = w - pad.left - pad.right;
  var chartH = h - pad.top - pad.bottom;

  // Collect all scores for scale
  var allScores = [];
  apparatuses.forEach(function(a) { progressionByApparatus[a].forEach(function(p) { allScores.push(p.score); }); });
  var minS = Math.max(0, Math.min.apply(null,allScores) - 1);
  var maxS = Math.max.apply(null,allScores) + 1;

  // Collect all unique dates in order
  var allDates = [];
  apparatuses.forEach(function(a) { progressionByApparatus[a].forEach(function(p) { if (allDates.indexOf(p.date)<0) allDates.push(p.date); }); });
  allDates.sort();

  if (allDates.length < 2) return;

  // Grid
  ctx.strokeStyle = "#e2e6ed"; ctx.lineWidth = 1;
  for (var i=0;i<=4;i++) {
    var y = pad.top + chartH - (chartH/4)*i;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+chartW,y); ctx.stroke();
    ctx.fillStyle="#8a96a8"; ctx.font="10px sans-serif"; ctx.textAlign="right";
    ctx.fillText((minS + (maxS-minS)/4*i).toFixed(1), pad.left-6, y+4);
  }

  // X labels
  ctx.fillStyle="#8a96a8"; ctx.font="10px sans-serif"; ctx.textAlign="center";
  allDates.forEach(function(d,i) {
    var x = pad.left + (i/(allDates.length-1))*chartW;
    ctx.fillText(d, x, h-pad.bottom+16);
  });

  // Lines
  apparatuses.forEach(function(a,ai) {
    var pts = progressionByApparatus[a];
    if (pts.length < 1) return;
    ctx.strokeStyle = colors[ai % colors.length];
    ctx.lineWidth = 2; ctx.lineJoin="round";
    ctx.beginPath();
    pts.forEach(function(p,pi) {
      var di = allDates.indexOf(p.date);
      var x = pad.left + (di/(allDates.length-1))*chartW;
      var y = pad.top + chartH - ((p.score-minS)/(maxS-minS))*chartH;
      if (pi===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Dots
    pts.forEach(function(p) {
      var di = allDates.indexOf(p.date);
      var x = pad.left + (di/(allDates.length-1))*chartW;
      var y = pad.top + chartH - ((p.score-minS)/(maxS-minS))*chartH;
      ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
      ctx.fillStyle=colors[ai%colors.length]; ctx.fill();
    });
    // Legend
    ctx.fillStyle=colors[ai%colors.length]; ctx.font="bold 10px sans-serif"; ctx.textAlign="left";
    ctx.fillText(a, pad.left + ai*90, pad.top+10);
  });
}

function collectCompOptions(comp) {

  document.getElementById("league-comps-num").textContent=competitions.length;

function buildLeagueData(f) {
  var gymnasts={},apparatusSet=new Set();
  competitions.forEach(function(comp){
    comp.sheets.forEach(function(sh){
      sh.entries.forEach(function(e){
        if(!e.memberId)return;
        if(f.gender&&f.gender!=="ALL"&&e.gender!==f.gender)return;
        if(f.ageCategory&&f.ageCategory!=="ALL"&&e.ageCategory!==f.ageCategory)return;
        if(f.level&&f.level!=="ALL"&&e.level!==f.level)return;
        if(f.country&&f.country!=="ALL"&&e.country!==f.country)return;
        if(f.region&&f.region!=="ALL"&&e.region!==f.region)return;
        if(f.trainingHrs&&f.trainingHrs!=="ALL"&&e.trainingHrs!==f.trainingHrs)return;
        if(f.memberSearch&&f.memberSearchMode!=="highlight"&&e.memberId.toLowerCase().indexOf(f.memberSearch.toLowerCase())<0)return;
        var score=parseFloat(e.score);if(isNaN(score))return;
        if(!gymnasts[e.memberId])gymnasts[e.memberId]={memberId:e.memberId,club:e.club,ageCategory:e.ageCategory,level:e.level,country:e.country,region:e.region,trainingHrs:e.trainingHrs,gender:e.gender,scores:{},total:0};
        var g=gymnasts[e.memberId];
        if(e.club)g.club=e.club;if(e.ageCategory)g.ageCategory=e.ageCategory;if(e.level)g.level=e.level;if(e.country)g.country=e.country;if(e.region)g.region=e.region;if(e.trainingHrs)g.trainingHrs=e.trainingHrs;if(e.gender)g.gender=e.gender;
        if(!g.scores[sh.apparatus]||score>g.scores[sh.apparatus])g.scores[sh.apparatus]=score;
        apparatusSet.add(sh.apparatus);
      });
    });
  });
  var allApparatus=Array.from(apparatusSet).sort();
  if(f.apparatus&&f.apparatus!=="ALL"){allApparatus=[f.apparatus];Object.keys(gymnasts).forEach(function(id){if(!gymnasts[id].scores[f.apparatus])delete gymnasts[id];});}
  var rows=Object.values(gymnasts);
  rows.forEach(function(g){g.total=0;allApparatus.forEach(function(a){g.total+=g.scores[a]||0;});g.total=Math.round(g.total*1000)/1000;});
  return{rows:rows,apparatus:allApparatus};
}

      html+='<tr'+(isHighlighted?' class="highlighted-row"':'')+'><td class="rank-cell '+rc+'">'+rank+'</td>';

      html+='<td class="total-cell">'+g.total.toFixed(3)+'</td></tr>';
    });

  }

  main.innerHTML=html;

function lth(col,label){var sorted=leagueSortCol===col;var icon=sorted?(leagueSortDir===-1?" ↓":" ↑"):" ↕";return '<th class="'+(sorted?"sorted":"")+'" onclick="doLeagueSort(\''+col+'\')">'+esc(label)+'<span class="sort-icon">'+icon+'</span></th>';}

    });
    html+='</tbody></table></div>';
  });
  var area=document.getElementById("results-area");
  if(!area)return;
  if(!totalVisible){area.innerHTML='<div class="no-results"><strong>No results match your filters.</strong><br/><span style="font-size:13px;color:#8a96a8">Try adjusting or clearing the filters above.</span></div>';return;}
  area.innerHTML='<div class="results-summary">Showing <span>'+totalVisible+'</span> result'+(totalVisible!==1?'s':'')+'</div>'+html;
}

function cth(apparatus,col,label){var sorted=compSortState.apparatus[apparatus]===col;var icon=sorted?(compSortState.dir===1?" ↑":" ↓"):" ↕";return '<th class="'+(sorted?"sorted":"")+'" onclick="doCompSort(\''+apparatus+'\',\''+col+'\')">'+label+'<span class="sort-icon">'+icon+'</span></th>';}
function doCompSort(apparatus,col){if(compSortState.apparatus[apparatus]===col)compSortState.dir=compSortState.dir===1?-1:1;else{compSortState.apparatus[apparatus]=col;compSortState.dir=col==="score"?-1:1;}renderCompResults();}
function setCompFilter(key,val){compFilters[key]=val;renderMain();}
function clearCompFilters(){compFilters=freshCompFilters();renderMain();}
function removeCompFilter(key){if(key==="memberSearch")compFilters.memberSearch="";else compFilters[key]="ALL";renderMain();}

function showWelcome(){document.getElementById("main").innerHTML='<div class="empty-state"><div class="empty-icon">🏅</div><div class="empty-title">No competition selected</div><div class="empty-sub">Select a competition from the left, or click League Table for national standings.</div></div>';}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

loadCompetitions();
</script>
</body>
</html>
