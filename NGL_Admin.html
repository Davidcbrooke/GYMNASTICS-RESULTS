<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NGL Admin Panel</title>
<style>
:root{ --navy:#1a2a4a; --gold:#c9a227; --gold2:#e8b830; --red:#c0392b; --line:#e0dbd0; --muted:#7a8090; --paper:#f9f7f3; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--navy); min-height:100vh; }
.gate{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.gate-box{ background:#fff; border-radius:12px; padding:36px; width:360px; text-align:center; }
.gate-box h2{ color:var(--navy); font-size:1.3rem; margin-bottom:6px; }
.gate-box h2 span{ color:var(--gold); }
.gate-box p{ color:var(--muted); font-size:.85rem; margin-bottom:20px; }
.gate-box input{ width:100%; padding:10px; border:2px solid var(--line); border-radius:6px; font-size:1rem; text-align:center; letter-spacing:4px; margin-bottom:12px; outline:none; }
.gate-box input:focus{ border-color:var(--gold); }
.gate-box button{ width:100%; background:var(--gold); color:var(--navy); border:none; padding:11px; border-radius:6px; font-weight:700; cursor:pointer; }
.app{ display:none; flex-direction:column; min-height:100vh; background:var(--paper); }
.app.visible{ display:flex; }
header{ background:var(--navy); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:16px; }
header h1{ font-size:1.1rem; font-weight:700; flex:1; }
header h1 span{ color:var(--gold); }
header img{ height:36px; }
.content{ padding:28px; max-width:1100px; margin:0 auto; width:100%; }
.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
.stat-card{ background:#fff; border-radius:8px; padding:20px; border:1px solid var(--line); text-align:center; }
.stat-card .num{ font-size:2rem; font-weight:700; color:var(--navy); }
.stat-card .lbl{ font-size:.78rem; color:var(--muted); margin-top:4px; }
.panel{ background:#fff; border-radius:8px; border:1px solid var(--line); overflow:hidden; margin-bottom:20px; }
.panel-hdr{ background:var(--navy); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
.panel-hdr h2{ font-size:.95rem; font-weight:700; }
.panel-hdr button{ background:var(--gold); color:var(--navy); border:none; padding:6px 14px; border-radius:4px; font-weight:700; font-size:.78rem; cursor:pointer; }
table{ width:100%; border-collapse:collapse; }
table th{ background:var(--paper); padding:10px 16px; font-size:.75rem; font-weight:700; color:var(--muted); text-align:left; border-bottom:2px solid var(--line); }
table td{ padding:12px 16px; font-size:.83rem; border-bottom:1px solid var(--line); }
table tr:last-child td{ border-bottom:none; }
table tr:hover td{ background:#f8f8f8; }
.badge{ display:inline-block; padding:3px 8px; border-radius:4px; font-size:.7rem; font-weight:700; }
.badge.active{ background:#d4edda; color:#155724; }
.badge.new{ background:#fff3cd; color:#856404; }
.btn-sm{ background:var(--navy); color:#fff; border:none; padding:5px 10px; border-radius:4px; font-size:.72rem; cursor:pointer; font-weight:600; margin-right:4px; }
.btn-sm:hover{ background:#243552; }
.btn-sm.red{ background:var(--red); }
.btn-sm.red:hover{ background:#a93226; }
.btn-sm.gold{ background:var(--gold); color:var(--navy); }
.empty{ padding:24px; text-align:center; color:var(--muted); font-style:italic; font-size:.85rem; }
.modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; display:none; align-items:center; justify-content:center; }
.modal-overlay.open{ display:flex; }
.modal-box{ background:#fff; border-radius:10px; padding:24px; width:500px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-box h3{ color:var(--navy); font-size:1.05rem; margin-bottom:16px; font-weight:700; }
.mf{ margin-bottom:12px; }
.mf label{ display:block; font-size:.75rem; font-weight:700; color:var(--navy); margin-bottom:4px; }
.mf textarea{ width:100%; padding:9px; border:2px solid var(--line); border-radius:6px; font-size:.8rem; font-family:monospace; height:200px; outline:none; }
.mf textarea:focus{ border-color:var(--gold); }
.modal-actions{ display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
.modal-actions button{ padding:8px 16px; border:none; border-radius:5px; font-weight:700; font-size:.83rem; cursor:pointer; }
.btn-save{ background:var(--gold); color:var(--navy); }
.btn-cancel{ background:#eee; color:#333; }
#toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--navy); color:#fff; padding:9px 18px; border-radius:6px; font-size:.82rem; opacity:0; transition:all .25s; pointer-events:none; z-index:9999; }
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <h2>NGL <span>Admin Panel</span></h2>
    <p>Enter admin password to continue</p>
    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Enter</button>
  </div>
</div>

  <div class="content">
    <div class="stats">
      <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Registered Clubs</div></div>
      <div class="stat-card"><div class="num" id="statNew">—</div><div class="lbl">New This Month</div></div>
      <div class="stat-card"><div class="num" id="statActive">—</div><div class="lbl">Active (have sessions)</div></div>
    </div>
    <div class="panel">
      <div class="panel-hdr">
        <h2>Registered Clubs</h2>
        <button onclick="loadClubs()">↻ Refresh</button>
      </div>
      <div id="clubsTable"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="importModal">
  <div class="modal-box">
    <h3 id="importTitle">Import Data for Club</h3>
    <div class="mf">
      <label>Paste JSON data (from SAADI v2 export or another club)</label>
      <textarea id="importData" placeholder='{"groups":[...],"locations":[...],"sessions":{}}'></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeImport()">Cancel</button>
      <button class="btn-save" onclick="doImport()">Import Data</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ADMIN_PASSWORD = 'ngl2026';
const DB_URL = 'https://saadi-rotation-default-rtdb.europe-west1.firebasedatabase.app';
let importingClubId = null;
let allClubs = [];

function checkPw(){
  if(document.getElementById('pwInput').value === ADMIN_PASSWORD){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').classList.add('visible');
    loadClubs();
  } else {
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').placeholder='Incorrect — try again';
    setTimeout(()=>document.getElementById('pwInput').placeholder='Password',1500);
  }
}

async function dbGet(path){ const r=await fetch(`${DB_URL}/${path}.json`); return r.json(); }
async function dbPut(path,data){ const r=await fetch(`${DB_URL}/${path}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.json(); }

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500); }

async function loadClubs(){
  document.getElementById('clubsTable').innerHTML='<div class="empty">Loading...</div>';
  try{
    const clubs = await dbGet('clubs');
    if(!clubs){ document.getElementById('clubsTable').innerHTML='<div class="empty">No clubs registered yet.</div>'; return; }
    allClubs = Object.entries(clubs).map(([uid,data])=>({uid,...data}));
    renderClubsTable();
    updateStats();
  }catch(e){
    document.getElementById('clubsTable').innerHTML='<div class="empty">Failed to load clubs.</div>';
  }
}

function updateStats(){
  const now=new Date(); const thisMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('statTotal').textContent=allClubs.length;
  document.getElementById('statNew').textContent=allClubs.filter(c=>c.profile&&c.profile.createdAt&&c.profile.createdAt.startsWith(thisMonth)).length;
  document.getElementById('statActive').textContent=allClubs.filter(c=>c.rota&&c.rota.groups&&c.rota.groups.length>0).length;
}

function renderClubsTable(){
  if(!allClubs.length){ document.getElementById('clubsTable').innerHTML='<div class="empty">No clubs registered yet.</div>'; return; }
  const table=document.createElement('table');
  table.innerHTML=`<thead><tr>
    <th>Club Name</th><th>Contact</th><th>Email</th><th>Joined</th><th>Groups</th><th>Sessions</th><th>Actions</th>
  </tr></thead>`;
  const tbody=document.createElement('tbody');
  allClubs.forEach(club=>{
    const p=club.profile||{};
    const r=club.rota||{};
    const groups=(r.groups||[]).length;
    const sessions=Object.values(r.sessions||{}).reduce((t,day)=>t+Object.values(day).reduce((t2,arr)=>t2+(arr||[]).length,0),0);
    const joined=p.createdAt?new Date(p.createdAt).toLocaleDateString('en-GB'):'—';
    const isNew=p.createdAt&&(Date.now()-new Date(p.createdAt).getTime())<7*24*60*60*1000;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><strong>${p.clubName||'—'}</strong> ${isNew?'<span class="badge new">NEW</span>':''}</td>
      <td>${p.contactName||'—'}</td>
      <td><a href="mailto:${p.email||''}">${p.email||'—'}</a></td>
      <td>${joined}</td>
      <td>${groups}</td>
      <td>${sessions}</td>
      <td>
        <button class="btn-sm gold" onclick="openImport('${club.uid}','${(p.clubName||'Club').replace(/'/g,"\\'")}')">⬆ Import Data</button>
        <button class="btn-sm" onclick="viewData('${club.uid}')">👁 View</button>
      </td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  document.getElementById('clubsTable').innerHTML='';
  document.getElementById('clubsTable').appendChild(table);
}

function openImport(uid, clubName){
  importingClubId=uid;
  document.getElementById('importTitle').textContent=`Import Data for ${clubName}`;
  document.getElementById('importData').value='';
  document.getElementById('importModal').classList.add('open');
}
function closeImport(){ document.getElementById('importModal').classList.remove('open'); importingClubId=null; }

async function doImport(){
  const raw=document.getElementById('importData').value.trim();
  if(!raw){ alert('Please paste JSON data.'); return; }
  let data;
  try{ data=JSON.parse(raw); }catch(e){ alert('Invalid JSON. Please check the data and try again.'); return; }
  if(!data.groups||!data.locations){ alert('Data missing groups or locations fields.'); return; }
  if(!confirm('This will overwrite all existing data for this club. Are you sure?')) return;
  try{
    await dbPut(`clubs/${importingClubId}/rota`,data);
    closeImport(); showToast('Data imported successfully!'); loadClubs();
  }catch(e){ alert('Import failed: '+e.message); }
}

async function viewData(uid){
  try{
    const rota=await dbGet(`clubs/${uid}/rota`);
    const groups=(rota&&rota.groups)||[];
    const locs=(rota&&rota.locations)||[];
    alert(`Groups: ${groups.map(g=>g.name).join(', ')||'none'}\n\nLocations: ${locs.map(l=>l.name).join(', ')||'none'}`);
  }catch(e){ alert('Failed to load data.'); }
}
</script>
</body>
</html>
