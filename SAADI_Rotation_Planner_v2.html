<style>
:root{
  --navy:#1a2a4a; --gold:#c9a227; --gold2:#e8b830; --cream:#f4f0e8;
  --red:#c0392b; --ink:#2b2b2b; --muted:#7a8090; --line:#e0dbd0;
  --white:#ffffff; --paper:#f9f7f3;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--paper); color:var(--ink); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ---- GATE ---- */
.gate{ position:fixed; inset:0; background:var(--navy); display:flex; align-items:center; justify-content:center; z-index:1000; }
.gate-box{ background:#fff; border-radius:12px; padding:36px; width:360px; text-align:center; }
.gate-box h2{ color:var(--navy); font-size:1.4rem; margin-bottom:6px; }
.gate-box h2 span{ color:var(--gold); }
.gate-box p{ color:var(--muted); font-size:.85rem; margin-bottom:20px; }
.gate-box input{ width:100%; padding:10px 14px; border:2px solid var(--line); border-radius:6px; font-size:1rem; text-align:center; letter-spacing:4px; margin-bottom:12px; outline:none; }
.gate-box input:focus{ border-color:var(--gold); }
.gate-box button{ width:100%; background:var(--gold); color:var(--navy); border:none; padding:11px; border-radius:6px; font-weight:700; font-size:1rem; cursor:pointer; }
.gate-box button:hover{ background:var(--gold2); }
body.locked .main-ui{ display:none; }

/* ---- HEADER ---- */
header{ background:var(--navy); color:#fff; padding:10px 20px; display:flex; align-items:center; gap:16px; flex:0 0 auto; }
header h1{ font-size:1.2rem; font-weight:700; letter-spacing:.5px; white-space:nowrap; }
header h1 span{ color:var(--gold); }
.header-clock{ font-size:1.4rem; font-weight:700; color:var(--gold); font-variant-numeric:tabular-nums; flex:1; text-align:center; display:none; }
.header-clock.visible{ display:block; }
.header-actions{ display:flex; align-items:center; gap:8px; flex:1; justify-content:center; }
.header-actions button{ background:var(--gold); color:var(--navy); border:none; padding:8px 16px; border-radius:5px; font-weight:700; font-size:.85rem; cursor:pointer; white-space:nowrap; }
.header-actions button:hover{ background:var(--gold2); }
.header-actions button.secondary{ background:rgba(255,255,255,.15); color:#fff; }
.header-actions button.secondary:hover{ background:rgba(255,255,255,.25); }
.save-status{ font-size:.78rem; color:rgba(255,255,255,.6); white-space:nowrap; }
  .week-toggle{ display:flex; background:rgba(255,255,255,.1); border-radius:6px; overflow:hidden; }
  .week-btn{ background:none; border:none; color:rgba(255,255,255,.6); padding:7px 14px; cursor:pointer; font-weight:700; font-size:.82rem; transition:all .15s; }
  .week-btn.active{ background:var(--gold); color:var(--navy); }
  .week-btn:not(.active):hover{ background:rgba(255,255,255,.15); color:#fff; }
.header-logo{ flex:0 0 auto; }
.header-logo img{ height:38px; display:block; }

/* ---- TABS ---- */
.tabs{ background:var(--navy); display:flex; gap:2px; padding:0 20px; flex:0 0 auto; border-top:1px solid rgba(255,255,255,.1); }
.tabs button{ background:none; border:none; color:rgba(255,255,255,.6); padding:10px 16px; cursor:pointer; font-size:.85rem; font-weight:600; border-bottom:3px solid transparent; transition:all .15s; white-space:nowrap; }
.tabs button:hover{ color:#fff; }
.tabs button.active{ color:#fff; border-bottom-color:var(--gold); }
.tabs .tab-sep{ width:1px; background:rgba(255,255,255,.15); margin:8px 8px; }

/* ---- MAIN LAYOUT ---- */
.main-ui{ display:flex; flex-direction:column; flex:1; overflow:hidden; }
.view{ display:none; flex:1; overflow:hidden; }
.view.active{ display:flex; flex-direction:column; }

/* ---- PLANNER TABLE VIEW ---- */
.planner-view{ flex:1; overflow:auto; }
.planner-scroll{ min-width:900px; }

.week-table{ width:100%; border-collapse:collapse; }
.week-table th{ background:var(--navy); color:#fff; padding:10px 12px; font-size:.78rem; font-weight:700; text-align:left; position:sticky; top:0; z-index:10; white-space:nowrap; }
.week-table th.day-col{ text-align:center; min-width:130px; }
.week-table th.group-col{ min-width:160px; position:sticky; left:0; z-index:11; }
.week-table td{ border:1px solid var(--line); vertical-align:top; padding:6px; min-height:60px; }
.week-table td.group-cell{ background:#fff; font-size:.8rem; font-weight:700; color:var(--navy); position:sticky; left:0; z-index:5; border-right:2px solid var(--line); min-width:160px; padding:8px 10px; }
.week-table td.group-cell .group-colour{ width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; flex-shrink:0; }
.week-table td.group-cell .group-label{ display:flex; align-items:center; }
.week-table td.day-cell{ cursor:pointer; min-width:130px; background:#fff; transition:background .1s; }
.week-table td.day-cell:hover{ background:#f0f4ff; }
.week-table td.day-cell.has-sessions{ background:#fff; }
.week-table tr:nth-child(even) td.day-cell{ background:var(--paper); }
.week-table tr:nth-child(even) td.day-cell:hover{ background:#e8eef8; }

/* section header rows */
.week-table tr.section-header td{ background:var(--navy); color:var(--gold); font-size:.75rem; font-weight:700; padding:6px 10px; letter-spacing:.5px; text-transform:uppercase; border:none; position:sticky; left:0; }

/* session chips in cells */
.session-chips{ display:flex; flex-direction:column; gap:3px; }
.session-chip{ border-radius:4px; padding:3px 7px; font-size:.72rem; font-weight:600; color:#fff; display:flex; align-items:center; justify-content:space-between; gap:4px; cursor:pointer; transition:opacity .1s; }
.session-chip:hover{ opacity:.85; }
.session-chip .chip-time{ opacity:.85; font-size:.68rem; white-space:nowrap; }
.session-chip .chip-loc{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.session-chip .chip-del{ opacity:0; font-size:.75rem; cursor:pointer; flex-shrink:0; }
.session-chip:hover .chip-del{ opacity:0.7; }
.add-session-btn{ width:100%; background:none; border:1px dashed var(--line); border-radius:4px; padding:4px; font-size:.72rem; color:var(--muted); cursor:pointer; margin-top:3px; transition:all .15s; }
.add-session-btn:hover{ border-color:var(--gold); color:var(--gold); background:rgba(201,162,39,.05); }

/* ---- SETTINGS VIEW ---- */
.settings-view{ flex:1; overflow:auto; padding:24px; }
.settings-grid{ display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:900px; }
.settings-panel{ background:#fff; border-radius:8px; border:1px solid var(--line); overflow:hidden; }
.settings-panel-header{ background:var(--navy); color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
.settings-panel-header h3{ font-size:.9rem; font-weight:700; }
.settings-panel-header button{ background:var(--gold); color:var(--navy); border:none; padding:5px 12px; border-radius:4px; font-weight:700; font-size:.78rem; cursor:pointer; }
.settings-panel-body{ padding:12px; }
.settings-list{ display:flex; flex-direction:column; gap:6px; }
.settings-item{ display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--paper); border-radius:5px; border:1px solid var(--line); }
.settings-item .item-colour{ width:14px; height:14px; border-radius:50%; flex-shrink:0; }
.settings-item .item-name{ flex:1; font-size:.82rem; font-weight:600; color:var(--navy); }
.settings-item .item-sub{ font-size:.72rem; color:var(--muted); }
.settings-item button{ background:none; border:none; cursor:pointer; font-size:.8rem; color:var(--muted); padding:2px 5px; }
.settings-item button:hover{ color:var(--red); }
.settings-empty{ color:var(--muted); font-size:.82rem; font-style:italic; padding:8px 0; }

/* ---- LIVE / TIMELINE VIEW ---- */
.live-view{ flex:1; overflow:hidden; background:var(--navy); flex-direction:column; }
.live-view.active{ display:flex; }
.timeline-container{ flex:1; overflow:hidden; display:flex; flex-direction:column; position:relative; }
/* single scroll container - overflow both axes */
.timeline-scroll-outer{ flex:1; overflow:auto; position:relative; }
.timeline-inner-wrap{ display:inline-block; min-width:100%; }

/* ruler sticks to top, labels stick to left */
.tl-ruler{ display:flex; height:32px; position:sticky; top:0; z-index:20; background:var(--navy); border-bottom:2px solid rgba(255,255,255,.15); }
.tl-ruler-spacer{ flex-shrink:0; background:var(--navy); border-right:2px solid rgba(255,255,255,.2); }
.tl-ruler-ticks{ position:relative; flex-shrink:0; }
.tl-ruler-ticks .tick{ position:absolute; top:0; bottom:0; border-left:1px solid rgba(255,255,255,.2); font-size:.65rem; color:rgba(255,255,255,.7); padding-left:3px; padding-top:8px; white-space:nowrap; }
.tl-ruler-ticks .tick.hour{ border-left:2px solid rgba(255,255,255,.5); font-weight:700; color:#fff; font-size:.72rem; }

.tl-section-sep{ height:26px; display:flex; align-items:center; background:rgba(255,255,255,.05); position:sticky; left:0; width:100%; }
.tl-section-sep span{ font-size:.7rem; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:1px; padding-left:12px; }

.tl-row{ display:flex; height:42px; border-bottom:1px solid rgba(255,255,255,.08); }
.tl-label{ flex-shrink:0; border-right:2px solid rgba(255,255,255,.15); display:flex; align-items:center; padding:0 10px; font-size:.78rem; font-weight:600; color:rgba(255,255,255,.9); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:var(--navy); position:sticky; left:0; z-index:10; }
.tl-track{ position:relative; flex-shrink:0; }
.tl-block{ position:absolute; top:3px; bottom:3px; border-radius:4px; display:flex; align-items:center; padding:0 6px; overflow:hidden; font-size:.72rem; font-weight:600; color:#fff; white-space:nowrap; }
.tl-block .b-loc{ flex:1; overflow:hidden; text-overflow:ellipsis; }
.tl-block .b-time{ opacity:.75; font-size:.65rem; margin-left:4px; flex-shrink:0; }
.tl-block.dim{ opacity:0.4; }
  .tl-block.conflict{ outline:2px solid #ff4444; box-shadow:0 0 0 3px rgba(255,68,68,.3); z-index:2; }
  .session-chip.conflict{ outline:2px solid #ff4444; box-shadow:0 0 0 2px rgba(255,68,68,.25); }
/* global now-line spans full height of scroll content */
.tl-now-line-global{ position:absolute; top:0; bottom:0; width:3px; background:var(--red); z-index:25; pointer-events:none; }
.tl-now-line-global::before{ content:''; position:absolute; top:32px; left:-5px; width:13px; height:13px; background:var(--red); border-radius:50%; border:2px solid #fff; }
.tl-block.flash{ animation:flash-anim 1s ease-in-out infinite; }
@keyframes flash-anim{ 0%,100%{ opacity:1; } 50%{ opacity:.4; } }

/* live header */
.live-header{ flex:0 0 auto; background:var(--navy); display:flex; align-items:center; padding:10px 20px; gap:16px; border-bottom:2px solid rgba(255,255,255,.1); }
.live-clock{ font-size:2rem; font-weight:700; color:var(--gold); font-variant-numeric:tabular-nums; }
.live-day{ font-size:1.1rem; font-weight:600; color:#fff; }
.live-exit{ background:rgba(255,255,255,.15); color:#fff; border:none; padding:8px 16px; border-radius:5px; font-weight:700; cursor:pointer; margin-left:auto; }
.live-exit:hover{ background:rgba(255,255,255,.25); }
.live-logo img{ height:36px; }

/* ---- MODAL ---- */
.modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; display:none; align-items:center; justify-content:center; }
.modal-overlay.open{ display:flex; }
.modal-box{ background:#fff; border-radius:10px; padding:24px; width:420px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-box h3{ color:var(--navy); font-size:1.1rem; margin-bottom:16px; }
.modal-field{ margin-bottom:14px; }
.modal-field label{ display:block; font-size:.78rem; font-weight:700; color:var(--navy); margin-bottom:5px; }
.modal-field select, .modal-field input{ width:100%; padding:9px 12px; border:2px solid var(--line); border-radius:6px; font-size:.88rem; outline:none; }
.modal-field select:focus, .modal-field input:focus{ border-color:var(--gold); }
.modal-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-actions{ display:flex; gap:8px; margin-top:20px; }
.modal-actions button{ padding:9px 18px; border:none; border-radius:5px; font-weight:700; font-size:.85rem; cursor:pointer; }
.btn-save{ background:var(--gold); color:var(--navy); }
.btn-save:hover{ background:var(--gold2); }
.btn-cancel{ background:#eee; color:var(--ink); }
.btn-cancel:hover{ background:#ddd; }
.btn-delete{ background:var(--red); color:#fff; }
.btn-delete:hover{ background:#a93226; }
.modal-actions .spacer{ flex:1; }

/* duration quick-pick */
.dur-chips{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.dur-chip{ background:var(--paper); border:1px solid var(--line); border-radius:4px; padding:5px 10px; font-size:.78rem; font-weight:600; cursor:pointer; color:var(--navy); }
.dur-chip:hover, .dur-chip.active{ background:var(--navy); color:#fff; border-color:var(--navy); }

/* colour swatches */
.colour-swatches{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.colour-swatch{ width:26px; height:26px; border-radius:50%; cursor:pointer; border:3px solid transparent; }
.colour-swatch.active{ border-color:var(--navy); }

/* ---- TOAST ---- */
#toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--navy); color:#fff; padding:10px 20px; border-radius:6px; font-size:.85rem; font-weight:600; opacity:0; transition:opacity .25s,transform .25s; pointer-events:none; z-index:9999; }
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ---- RESPONSIVE ---- */
@media(max-width:700px){
  .settings-grid{ grid-template-columns:1fr; }
  .week-table th.day-col, .week-table td.day-cell{ min-width:90px; }
}
</style>
</head>

    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()">
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<div class="main-ui">

<!-- SESSION MODAL -->
<div class="modal-overlay" id="sessionModal">
  <div class="modal-box">
    <h3 id="sessionModalTitle">Add Session</h3>
    <div class="modal-field">
      <label>Week A Location</label>
      <select id="sm_location"></select>
    </div>
    <div class="modal-field" id="sm_locationB_field">
      <label style="display:flex;align-items:center;gap:8px;">
        Week B Location
        <span style="font-size:.7rem;color:var(--muted);font-weight:400;">(optional — for 2-week rotation)</span>
      </label>
      <select id="sm_locationB">
        <option value="">— Same as Week A —</option>
      </select>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label>Start time</label>
        <select id="sm_start"></select>
      </div>
      <div class="modal-field">
        <label>Duration (mins)</label>
        <input type="number" id="sm_duration" value="30" min="5" max="240" step="5">
      </div>
    </div>
    <div class="modal-field">
      <div class="dur-chips" id="durChips">
        <span class="dur-chip" onclick="setDur(15)">15</span>
        <span class="dur-chip" onclick="setDur(30)">30</span>
        <span class="dur-chip" onclick="setDur(45)">45</span>
        <span class="dur-chip" onclick="setDur(60)">60</span>
        <span class="dur-chip" onclick="setDur(90)">90</span>
        <span class="dur-chip" onclick="setDur(120)">120</span>
      </div>
    </div>
    <div class="modal-field">
      <label>Activity (optional)</label>
      <input type="text" id="sm_title" placeholder="e.g. Strength & Conditioning">
    </div>
    <div class="modal-field" id="sm_repeat_field">
      <label>Also add to days</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;" id="sm_days">
        <label class="dur-chip" id="sm_day_Mon"><input type="checkbox" value="Monday" style="margin-right:4px">M</label>
        <label class="dur-chip" id="sm_day_Tue"><input type="checkbox" value="Tuesday" style="margin-right:4px">T</label>

<script>
// ================================================================
// CONFIG
// ================================================================
const CONFIG = {
  password: 'SAADI1234#',
  databaseURL: 'https://saadi-rotation-default-rtdb.europe-west1.firebasedatabase.app',
  path: 'rota_v2'
};

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const SWATCH_COLOURS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db',
  '#9b59b6','#e91e8c','#795548','#607d8b','#c9a227','#1a2a4a'
];

const LOC_COLOURS = {
  'Floor':'#4a90d9','Bars':'#7b68ee','Beam':'#e8914f','Vault':'#5cb85c',
  'Tumble / Track':'#d9534f','Pommel / Rings':'#9b59b6','Rooms':'#f39c12','Other':'#95a5a6'
};

// ================================================================
// DATA MODEL
// ================================================================
// DATA.groups = [{id, name, section, colour, days:[]}]
// DATA.locations = [{id, name, category, colour}]
// DATA.sessions = { Monday: { groupId: [{location, start_min, duration, title}] } }

let DATA = { groups:[], locations:[], sessions:{} };
let editingSession = null; // {day, groupId, sessionIdx} or null for new
let editingGroup = null;
let editingLocation = null;
let selectedGroupColour = SWATCH_COLOURS[0];
let selectedLocColour = '#4a90d9';
let liveMode = false;
let liveTimer = null;
let audioCtx = null;
let lastFlashMin = -1;
let currentWeek = 'A'; // 'A' or 'B'

function setWeek(w){
  currentWeek = w;
  document.getElementById('weekABtn').classList.toggle('active', w==='A');
  document.getElementById('weekBBtn').classList.toggle('active', w==='B');
  renderWeekTable();
  showToast('Showing Week ' + w + ' rotations');
}

function getSessionLocation(session){
  if(currentWeek==='B' && session.locationB) return session.locationB;
  return session.location;
}

// ================================================================
// UTILITIES
// ================================================================
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmtTime(mins){
  const h = Math.floor(mins/60), m = mins%60;
  const ampm = h>=12?'pm':'am';
  const hh = h>12?h-12:h===0?12:h;
  return hh+':'+(m<10?'0':'')+m+ampm;
}

function parseTime(str){
  if(!str) return null;
  str = str.trim().toLowerCase();
  const m = str.match(/(\d+):?(\d*)\s*(am|pm)/);
  if(!m) return null;
  let h=parseInt(m[1]), mi=m[2]?parseInt(m[2]):0, ap=m[3];
  if(ap==='pm'&&h!==12) h+=12;
  if(ap==='am'&&h===12) h=0;
  return h*60+mi;
}

function nowMinutes(){
  const d=new Date(); return d.getHours()*60+d.getMinutes()+d.getSeconds()/60;
}

function getTodayName(){
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

function setDur(v){
  document.getElementById('sm_duration').value=v;
  document.querySelectorAll('.dur-chip').forEach(c=>c.classList.toggle('active',parseInt(c.textContent)===v));
}

function getGroupById(id){ return DATA.groups.find(g=>g.id===id); }
function getLocationByName(name){ return DATA.locations.find(l=>l.name===name); }

function getDayBounds(day){
  const sessions = DATA.sessions[day]||{};
  let min=Infinity, max=-Infinity;
  Object.values(sessions).forEach(arr=>{
    arr.forEach(s=>{ min=Math.min(min,s.start_min); max=Math.max(max,s.start_min+s.duration); });
  });
  if(min===Infinity){ min=8*60; max=20*60; }
  else { min=Math.min(min,8*60); max=Math.max(max,20*60); }
  return {min,max};
}

// ================================================================
// PASSWORD GATE
// ================================================================
function checkPassword(){
  if(document.getElementById('pwInput').value===CONFIG.password){
    document.body.classList.remove('locked');
    document.getElementById('gate').style.display='none';
    init().catch(e=>{ console.error('Init error:',e); alert('Error starting app: '+e.message); });
  } else {
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').placeholder='Incorrect — try again';
    setTimeout(()=>document.getElementById('pwInput').placeholder='Password',1500);
  }
}

// ================================================================
// FIREBASE
// ================================================================
let saveTimer=null;
function scheduleAutoSave(){
  const s=document.getElementById('saveStatus');
  s.textContent='Unsaved changes…';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveNow, 2500);
}

async function saveNow(){
  const btn=document.querySelector('button[onclick="saveNow()"]');
  if(btn){ btn.textContent='💾 Saving…'; btn.disabled=true; }
  lastSaveTime=Date.now();
  try{
    const url=`${CONFIG.databaseURL}/${CONFIG.path}.json`;
    const res=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(DATA)});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const now=new Date();
    document.getElementById('saveStatus').textContent=`Saved ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  }catch(e){
    document.getElementById('saveStatus').textContent='Save failed';
  }finally{
    if(btn){ btn.textContent='💾 Save'; btn.disabled=false; }
  }
}

async function fetchData(){
  try{
    const url=`${CONFIG.databaseURL}/${CONFIG.path}.json`;
    const res=await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json && json.groups){
      DATA=json;
      DAYS.forEach(d=>{ if(!DATA.sessions[d]) DATA.sessions[d]={}; });
    }
  }catch(e){
    console.warn('Firebase load failed, using empty data',e);
    document.getElementById('saveStatus').textContent='Firebase offline — changes not saved';
  }
}

// ---- Real-time listener via Firebase SSE ----

// locations that are shared/flexible — no conflict flagged
const NO_CONFLICT = ['TBC'];

function getConflictsForDay(day){
  // collect all sessions across all groups with their location (week-aware)
  const allSessions = [];
  DATA.groups.forEach(group=>{
    const sessions = (DATA.sessions[day]&&DATA.sessions[day][group.id])||[];
    sessions.forEach((s,idx)=>{
      allSessions.push({
        groupId: group.id,
        groupName: group.name,
        idx,
        location: getSessionLocation(s),
        start_min: s.start_min,
        end_min: s.start_min + s.duration
      });
    });
  });
  // find conflicts: same location, overlapping time
  const conflictKeys = new Set();
  for(let i=0; i<allSessions.length; i++){
    for(let j=i+1; j<allSessions.length; j++){
      const a=allSessions[i], b=allSessions[j];
      if(NO_CONFLICT.includes(a.location)||NO_CONFLICT.includes(b.location)) continue;
      if(a.location !== b.location) continue;
      if(a.start_min >= b.end_min || b.start_min >= a.end_min) continue;
      // overlap found
      conflictKeys.add(`${a.groupId}:${a.idx}`);
      conflictKeys.add(`${b.groupId}:${b.idx}`);
    }
  }
  return conflictKeys;
}
let realtimeSource=null;
let lastSaveTime=0;

function startRealtimeListener(){
  if(realtimeSource) realtimeSource.close();
  const url=`${CONFIG.databaseURL}/${CONFIG.path}.json`;
  try{
    realtimeSource = new EventSource(url);
    realtimeSource.addEventListener('put', e=>{
      if(Date.now()-lastSaveTime < 3000) return; // ignore our own saves
      try{
        const payload=JSON.parse(e.data);
        if(payload && payload.data && payload.data.groups){
          DATA=payload.data;
          DAYS.forEach(d=>{ if(!DATA.sessions[d]) DATA.sessions[d]={}; });
          if(currentTab==='planner') renderWeekTable();
          if(currentTab==='settings') renderSettings();
          if(liveMode){ renderTimeline(getTodayName()); }
          showToast('📡 Updated by another user');
        }
      }catch(err){ console.warn('SSE parse error',err); }
    });
    realtimeSource.addEventListener('patch', e=>{
      if(Date.now()-lastSaveTime < 3000) return;
      fetchData().then(()=>{
        if(currentTab==='planner') renderWeekTable();
        if(currentTab==='settings') renderSettings();
        if(liveMode){ renderTimeline(getTodayName()); }
        showToast('📡 Updated by another user');
      });
    });
    realtimeSource.onerror = ()=>{
      realtimeSource.close();
      setTimeout(startRealtimeListener, 5000);
    };
  }catch(e){
    console.warn('SSE not supported, falling back to 30s polling');
    setInterval(()=>{
      if(Date.now()-lastSaveTime < 3000) return;
      fetchData().then(()=>{ if(currentTab==='planner') renderWeekTable(); });
    }, 30000);
  }
}

// ================================================================
// TABS
// ================================================================
let currentTab='planner';
function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML='';
  [{id:'planner',label:'📋 Weekly Planner'},{id:'settings',label:'⚙ Groups & Locations'}].forEach(t=>{

// ================================================================
// WEEK TABLE
// ================================================================
function renderWeekTable(){
  const table=document.getElementById('weekTable');
  table.innerHTML='';

  // header row
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  const thg=document.createElement('th'); thg.className='group-col'; thg.textContent='Group'; hr.appendChild(thg);
  DAYS.forEach((d,i)=>{ const th=document.createElement('th'); th.className='day-col'; th.textContent=d; hr.appendChild(th); });
  thead.appendChild(hr); table.appendChild(thead);

  const tbody=document.createElement('tbody');

  // render squad groups
  renderSectionRows(tbody, 'squad', 'Squads');
  renderSectionRows(tbody, 'recreational', 'Recreational');

  table.appendChild(tbody);
}

function renderSectionRows(tbody, section, label){
  const groups=DATA.groups.filter(g=>g.section===section);
  if(groups.length===0 && section==='squad') return;

  // section header
  const sepRow=document.createElement('tr'); sepRow.className='section-header';
  const sepTd=document.createElement('td'); sepTd.colSpan=8; sepTd.textContent=label;
  sepRow.appendChild(sepTd); tbody.appendChild(sepRow);

  groups.forEach(group=>{
    const tr=document.createElement('tr');

    // group label cell
    const tdg=document.createElement('td'); tdg.className='group-cell';
    tdg.innerHTML=`<div class="group-label"><span class="group-colour" style="background:${group.colour}"></span>${group.name}</div>`;
    tdg.ondblclick=()=>openGroupModal(group.id);
    tdg.title='Double-click to edit group';
    tr.appendChild(tdg);

    // day cells
    DAYS.forEach(day=>{
      const td=document.createElement('td'); td.className='day-cell';
      const activeDays=group.days||DAYS;
      if(!activeDays.includes(day)){
        td.style.background='#f5f5f5'; td.style.cursor='default';
        td.title='Group not active on '+day;
        tr.appendChild(td); return;
      }
      const sessions=(DATA.sessions[day]&&DATA.sessions[day][group.id])||[];
      const chips=document.createElement('div'); chips.className='session-chips';
      const dayConflicts=getConflictsForDay(day);
      sessions.forEach((s,idx)=>{
        const chip=document.createElement('div'); chip.className='session-chip';
        if(dayConflicts.has(`${group.id}:${idx}`)) chip.classList.add('conflict');
        const activeLoc = getSessionLocation(s);
        const loc=getLocationByName(activeLoc);
        chip.style.background=loc?loc.colour:'#888';
        const light=isLight(loc?loc.colour:'#888');
        if(light) chip.style.color='#2b2b2b';
        const weekBadge = s.locationB ? `<span style="font-size:.62rem;opacity:.7;flex-shrink:0">Wk${currentWeek}</span>` : '';
        chip.innerHTML=`
          <span class="chip-time">${fmtTime(s.start_min)}</span>
          <span class="chip-loc">${activeLoc}${s.title?' · '+s.title:''}</span>
          <span class="chip-dur" style="opacity:.7;font-size:.65rem;flex-shrink:0">${s.duration}m</span>
          ${weekBadge}
          <span class="chip-del" onclick="event.stopPropagation();quickDeleteSession('${day}','${group.id}',${idx})">✕</span>`;
        chip.onclick=()=>openSessionModal(day,group.id,idx);
        chips.appendChild(chip);
      });
      const addBtn=document.createElement('button'); addBtn.className='add-session-btn';
      addBtn.textContent='+ Add session';
      addBtn.onclick=()=>openSessionModal(day,group.id,null);
      chips.appendChild(addBtn);
      td.appendChild(chips);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  // add group button row
  const addRow=document.createElement('tr');
  const addTd=document.createElement('td'); addTd.colSpan=8;
  addTd.style.cssText='padding:6px 10px; border:none;';
  const addBtn=document.createElement('button');
  addBtn.style.cssText='background:none;border:1px dashed var(--line);border-radius:5px;padding:5px 14px;font-size:.78rem;color:var(--muted);cursor:pointer;';
  addBtn.textContent=`+ Add ${label.slice(0,-1)} group`;
  addBtn.onclick=()=>{ openGroupModal(null,section); };
  addTd.appendChild(addBtn); addRow.appendChild(addTd); tbody.appendChild(addRow);
}

function isLight(hex){
  if(!hex||!hex.startsWith('#')) return false;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>150;
}

// ================================================================
// SESSION MODAL
// ================================================================
function openSessionModal(day, groupId, sessionIdx){
  editingSession={day, groupId, sessionIdx};
  const group=getGroupById(groupId);
  const isNew=sessionIdx===null;
  const isRec=group.section==='recreational';
  document.getElementById('sessionModalTitle').textContent=(isNew?'Add Session':'Edit Session')+' — '+group.name+' ('+day+')';
  document.getElementById('sm_locationB_field').style.display=isRec?'block':'none';
  document.getElementById('sm_deleteBtn').style.display=isNew?'none':'block';

  // populate location dropdowns (both Week A and Week B)
  const sel=document.getElementById('sm_location');
  const selB=document.getElementById('sm_locationB');
  sel.innerHTML=''; selB.innerHTML='<option value="">— Same as Week A —</option>';
  DATA.locations.forEach(l=>{
    [sel,selB].forEach(s=>{
      const opt=document.createElement('option'); opt.value=l.name; opt.textContent=l.name+(l.category?' ('+l.category+')':'');
      s.appendChild(opt);
    });
  });
  if(DATA.locations.length===0){
    const opt=document.createElement('option'); opt.value='TBC'; opt.textContent='TBC'; sel.appendChild(opt);
  }

  // populate start time dropdown (5-min increments 6am–10pm)
  const startSel=document.getElementById('sm_start');
  startSel.innerHTML='';
  for(let t=6*60;t<=22*60;t+=5){
    const opt=document.createElement('option'); opt.value=t; opt.textContent=fmtTime(t); startSel.appendChild(opt);
  }

  if(!isNew){
    const s=DATA.sessions[day][groupId][sessionIdx];
    sel.value=s.location;
    selB.value=s.locationB||'';
    startSel.value=s.start_min;
    document.getElementById('sm_duration').value=s.duration;
    document.getElementById('sm_title').value=s.title||'';
    setDur(s.duration);
  } else {
    // default start time: look at existing sessions for this group on this day
    const existing=(DATA.sessions[day]&&DATA.sessions[day][groupId])||[];
    let defaultStart=16*60; // 4pm
    if(existing.length>0){
      const last=existing[existing.length-1];
      defaultStart=last.start_min+last.duration;
    }
    startSel.value=defaultStart;
    setDur(30);
    document.getElementById('sm_title').value='';
  }

  document.getElementById('sessionModal').classList.add('open');
  // reset repeat-day checkboxes — disable current day, uncheck all
  const dayValues={Monday:'Mon',Tuesday:'Tue',Wednesday:'Wed',Thursday:'Thu',Friday:'Fri',Saturday:'Sat',Sunday:'Sun'};
  const activeDays=group.days||DAYS;
  document.querySelectorAll('#sm_days input').forEach(cb=>{
    const isCurrentDay = cb.value===day;
    const isActiveDay = activeDays.includes(cb.value);
    cb.checked=false;
    cb.disabled=isCurrentDay||!isActiveDay;
    cb.parentElement.style.opacity=(isCurrentDay||!isActiveDay)?'0.4':'1';
  });
  document.getElementById('sm_duration').oninput=()=>{
    const v=parseInt(document.getElementById('sm_duration').value)||30;
    document.querySelectorAll('.dur-chip').forEach(c=>c.classList.toggle('active',parseInt(c.textContent)===v));
  };
}

function closeSessionModal(){
  document.getElementById('sessionModal').classList.remove('open');
  editingSession=null;
}

function saveSession(){
  const {day,groupId,sessionIdx}=editingSession;
  const location=document.getElementById('sm_location').value;
  const locationB=document.getElementById('sm_locationB').value||null;
  const start_min=parseInt(document.getElementById('sm_start').value);
  const duration=parseInt(document.getElementById('sm_duration').value)||30;
  const title=document.getElementById('sm_title').value.trim();
  if(!location){ alert('Please select a location.'); return; }
  if(!DATA.sessions[day]) DATA.sessions[day]={};
  if(!DATA.sessions[day][groupId]) DATA.sessions[day][groupId]=[];
  const session={location,start_min,duration,title};
  if(locationB) session.locationB=locationB;
  if(sessionIdx===null){
    DATA.sessions[day][groupId].push(session);
    DATA.sessions[day][groupId].sort((a,b)=>a.start_min-b.start_min);
  } else {
    DATA.sessions[day][groupId][sessionIdx]=session;
    DATA.sessions[day][groupId].sort((a,b)=>a.start_min-b.start_min);
  }

  // copy to any ticked repeat days
  const repeatDays=[...document.querySelectorAll('#sm_days input:checked')].map(cb=>cb.value);
  repeatDays.forEach(repeatDay=>{
    if(!DATA.sessions[repeatDay]) DATA.sessions[repeatDay]={};
    if(!DATA.sessions[repeatDay][groupId]) DATA.sessions[repeatDay][groupId]=[];
    const copy=Object.assign({},session);
    DATA.sessions[repeatDay][groupId].push(copy);
    DATA.sessions[repeatDay][groupId].sort((a,b)=>a.start_min-b.start_min);
  });
  const repeatMsg=repeatDays.length>0?` (copied to ${repeatDays.map(d=>d.slice(0,3)).join(', ')})`:'';

  closeSessionModal();
  renderWeekTable();
  scheduleAutoSave();
  showToast((sessionIdx===null?'Session added':'Session updated')+repeatMsg);
}

function deleteSession(){
  const {day,groupId,sessionIdx}=editingSession;
  if(!confirm('Delete this session?')) return;
  DATA.sessions[day][groupId].splice(sessionIdx,1);
  closeSessionModal();
  renderWeekTable();
  scheduleAutoSave();
}

function quickDeleteSession(day,groupId,idx){
  if(!confirm('Delete this session?')) return;
  DATA.sessions[day][groupId].splice(idx,1);
  renderWeekTable();
  scheduleAutoSave();
}

function renderColourSwatches(containerId, currentColour, onSelect){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  SWATCH_COLOURS.forEach(c=>{
    const s=document.createElement('div'); s.className='colour-swatch'+(c===currentColour?' active':'');
    s.style.background=c;
    s.onclick=()=>{ el.querySelectorAll('.colour-swatch').forEach(x=>x.classList.remove('active')); s.classList.add('active'); onSelect(c); };
    el.appendChild(s);
  });
}

function openGroupModal(id=null, defaultSection='squad'){
  editingGroup=id;
  const group=id?getGroupById(id):null;
  document.getElementById('groupModalTitle').textContent=group?'Edit Group':'Add Group';
  document.getElementById('gm_deleteBtn').style.display=group?'block':'none';
  document.getElementById('gm_name').value=group?group.name:'';
  document.getElementById('gm_section').value=group?group.section:defaultSection;
  selectedGroupColour=group?group.colour:SWATCH_COLOURS[0];
  renderColourSwatches('gm_swatches',selectedGroupColour,c=>{ selectedGroupColour=c; });
  const activeDays=group?(group.days||DAYS):DAYS;
  document.querySelectorAll('#gm_days input').forEach(cb=>{ cb.checked=activeDays.includes(cb.value); });
  document.getElementById('groupModal').classList.add('open');
  setTimeout(()=>document.getElementById('gm_name').focus(),100);
}

function closeGroupModal(){ document.getElementById('groupModal').classList.remove('open'); editingGroup=null; }

function saveGroup(){
  const name=document.getElementById('gm_name').value.trim();
  if(!name){ alert('Please enter a group name.'); return; }
  const section=document.getElementById('gm_section').value;
  const days=[...document.querySelectorAll('#gm_days input:checked')].map(c=>c.value);
  if(editingGroup){
    const g=getGroupById(editingGroup);
    g.name=name; g.section=section; g.colour=selectedGroupColour; g.days=days;
  } else {
    DATA.groups.push({id:genId(),name,section,colour:selectedGroupColour,days});
  }
  closeGroupModal();
  renderSettings();
  renderWeekTable();
  scheduleAutoSave();
  showToast(editingGroup?'Group updated':'Group added');
}

function deleteGroup(){
  if(!confirm('Delete this group and all its sessions? This cannot be undone.')) return;
  // remove sessions
  DAYS.forEach(day=>{ if(DATA.sessions[day]) delete DATA.sessions[day][editingGroup]; });
  DATA.groups=DATA.groups.filter(g=>g.id!==editingGroup);
  closeGroupModal();
  renderSettings();
  renderWeekTable();
  scheduleAutoSave();
}

// ================================================================
// LOCATION MODAL
// ================================================================
function openLocationModal(id=null){
  editingLocation=id;
  const loc=id?DATA.locations.find(l=>l.id===id):null;
  document.getElementById('locationModalTitle').textContent=loc?'Edit Location':'Add Location';
  document.getElementById('lm_deleteBtn').style.display=loc?'block':'none';
  document.getElementById('lm_name').value=loc?loc.name:'';
  document.getElementById('lm_category').value=loc?loc.category:'Floor';
  selectedLocColour=loc?loc.colour:LOC_COLOURS['Floor'];
  renderColourSwatches('lm_swatches',selectedLocColour,c=>{ selectedLocColour=c; });
  document.getElementById('lm_category').onchange=()=>{
    const cat=document.getElementById('lm_category').value;
    selectedLocColour=LOC_COLOURS[cat]||'#888';
    renderColourSwatches('lm_swatches',selectedLocColour,c=>{ selectedLocColour=c; });
  };
  document.getElementById('locationModal').classList.add('open');
  setTimeout(()=>document.getElementById('lm_name').focus(),100);
}

function closeLocationModal(){ document.getElementById('locationModal').classList.remove('open'); editingLocation=null; }

function saveLocation(){
  const name=document.getElementById('lm_name').value.trim().toUpperCase();
  if(!name){ alert('Please enter a location name.'); return; }
  const category=document.getElementById('lm_category').value;
  if(editingLocation){
    const l=DATA.locations.find(x=>x.id===editingLocation);
    l.name=name; l.category=category; l.colour=selectedLocColour;
  } else {
    DATA.locations.push({id:genId(),name,category,colour:selectedLocColour});
  }
  closeLocationModal();
  renderSettings();
  scheduleAutoSave();
  showToast(editingLocation?'Location updated':'Location added');
}

function deleteLocation(){
  if(!confirm('Delete this location?')) return;
  DATA.locations=DATA.locations.filter(l=>l.id!==editingLocation);
  closeLocationModal();
  renderSettings();
  scheduleAutoSave();
}

// ================================================================
// SETTINGS VIEW
// ================================================================
function renderSettings(){
  // groups list
  const gl=document.getElementById('groupsList');
  gl.innerHTML='';
  if(DATA.groups.length===0){ gl.innerHTML='<p class="settings-empty">No groups yet. Add your first group above.</p>'; }
  DATA.groups.forEach(g=>{
    const item=document.createElement('div'); item.className='settings-item';
    item.innerHTML=`<span class="item-colour" style="background:${g.colour}"></span>
      <span class="item-name">${g.name}</span>
      <span class="item-sub">${g.section} · ${(g.days||DAYS).length===7?'All days':(g.days||DAYS).map(d=>d.slice(0,3)).join(', ')}</span>
      <button onclick="openGroupModal('${g.id}')" title="Edit">✏</button>`;
    gl.appendChild(item);
  });

  // locations list
  const ll=document.getElementById('locationsList');
  ll.innerHTML='';
  if(DATA.locations.length===0){ ll.innerHTML='<p class="settings-empty">No locations yet. Add your first location above.</p>'; }
  const grouped={};
  DATA.locations.forEach(l=>{ if(!grouped[l.category]) grouped[l.category]=[]; grouped[l.category].push(l); });
  Object.entries(grouped).forEach(([cat,locs])=>{
    const catLabel=document.createElement('div');
    catLabel.style.cssText='font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 0 3px;letter-spacing:.5px;';
    catLabel.textContent=cat; ll.appendChild(catLabel);
    locs.forEach(l=>{
      const item=document.createElement('div'); item.className='settings-item';
      item.innerHTML=`<span class="item-colour" style="background:${l.colour}"></span>
        <span class="item-name">${l.name}</span>
        <button onclick="openLocationModal('${l.id}')" title="Edit">✏</button>`;
      ll.appendChild(item);
    });
  });
}

// ================================================================
// LIVE / TIMELINE VIEW
// ================================================================
const PX_PER_MIN = 14;

function enterLive(){
  liveMode=true;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('liveView').classList.add('active');
  document.getElementById('tabs').style.display='none';
  document.querySelector('.header-actions').style.display='none';
  document.querySelector('.header-logo').style.display='none';
  // show clock in header
  document.getElementById('liveClock').classList.add('visible');
  const day=getTodayName();
  document.getElementById('liveDayLabel').textContent=day+' — Week '+currentWeek+' — Live View';
  renderTimeline(day);
  startLiveClock();
  // try fullscreen
  try{ document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); }catch(e){}
}

function exitLive(){
  liveMode=false;
  clearInterval(liveTimer);
  document.getElementById('liveClock').classList.remove('visible');
  document.getElementById('tabs').style.display='';
  document.querySelector('.header-actions').style.display='';
  document.querySelector('.header-logo').style.display='';
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  if(currentTab==='planner') document.getElementById('plannerView').classList.add('active');
  else document.getElementById('settingsView').classList.add('active');
  try{ document.exitFullscreen&&document.exitFullscreen(); }catch(e){}
}

function startLiveClock(){
  function tick(){
    const n=new Date();
    const ts=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
    document.getElementById('liveClockBig').textContent=ts;
    document.getElementById('liveClock').textContent=ts;
    updateNowLine();
    checkFlash();
  }
  tick();
  liveTimer=setInterval(tick,1000);
}

function renderTimeline(day){
  const container=document.getElementById('timelineContainer');
  container.innerHTML='';
  const {min,max}=getDayBounds(day);
  const lblW=200;
  const width=(max-min)*PX_PER_MIN;
  const totalW=lblW+width;

  // single outer scroll container
  const outer=document.createElement('div'); outer.className='timeline-scroll-outer'; outer.id='tlScroll';
  const inner=document.createElement('div'); inner.className='timeline-inner-wrap'; inner.style.width=totalW+'px';

  // global ruler (sticky top)
  const ruler=document.createElement('div'); ruler.className='tl-ruler'; ruler.style.width=totalW+'px';
  const rSpacer=document.createElement('div'); rSpacer.className='tl-ruler-spacer'; rSpacer.style.width=lblW+'px';
  const rTicks=document.createElement('div'); rTicks.className='tl-ruler-ticks'; rTicks.style.width=width+'px';
  for(let t=min;t<=max;t+=30){
    if(t===min) continue;
    const tick=document.createElement('div');
    tick.className='tick'+(t%60===0?' hour':'');
    tick.style.left=((t-min)*PX_PER_MIN)+'px';
    tick.textContent=fmtTime(t);
    rTicks.appendChild(tick);
  }
  ruler.appendChild(rSpacer); ruler.appendChild(rTicks);
  inner.appendChild(ruler);

  // global now-line (spans full height, positioned over tracks area)
  const nowLineGlobal=document.createElement('div'); nowLineGlobal.className='tl-now-line-global'; nowLineGlobal.id='tlNowLine';
  nowLineGlobal.style.left=lblW+'px'; // will be updated by updateNowLine
  inner.appendChild(nowLineGlobal);

  // compute conflicts for this day
  const conflicts=getConflictsForDay(day);

  // build sections
  ['squad','recreational'].forEach(section=>{
    const groups=DATA.groups.filter(g=>g.section===section&&(g.days||DAYS).includes(day));
    if(groups.length===0) return;

    const sep=document.createElement('div'); sep.className='tl-section-sep'; sep.style.width=totalW+'px';
    sep.innerHTML=`<span>${section==='squad'?'Squads':'Recreational — Week ${currentWeek}'}</span>`;
    inner.appendChild(sep);

    groups.forEach(group=>{
      const sessions=(DATA.sessions[day]&&DATA.sessions[day][group.id])||[];
      const row=document.createElement('div'); row.className='tl-row'; row.style.width=totalW+'px';
      const lbl=document.createElement('div'); lbl.className='tl-label'; lbl.style.width=lblW+'px'; lbl.textContent=group.name;
      const track=document.createElement('div'); track.className='tl-track'; track.style.width=width+'px';
      track.style.backgroundImage='linear-gradient(90deg,rgba(255,255,255,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px)';
      track.style.backgroundSize=`${PX_PER_MIN*60}px 100%,${PX_PER_MIN*30}px 100%,${PX_PER_MIN*5}px 100%`;

      sessions.forEach(s=>{
        const activeLoc=getSessionLocation(s);
        const loc=getLocationByName(activeLoc);
        const bg=loc?loc.colour:'#555';
        const light=isLight(bg);
        const block=document.createElement('div'); block.className='tl-block';
        if(conflicts.has(`${group.id}:${sessions.indexOf(s)}`)) block.classList.add('conflict');
        block.style.left=((s.start_min-min)*PX_PER_MIN)+'px';
        block.style.width=Math.max(s.duration*PX_PER_MIN-2,18)+'px';
        block.style.background=bg;
        block.style.color=light?'#2b2b2b':'#fff';
        block.dataset.startMin=s.start_min;
        block.dataset.endMin=s.start_min+s.duration;
        block.innerHTML=`<span class="b-loc">${activeLoc}${s.title?' · '+s.title:''}</span><span class="b-time">${fmtTime(s.start_min)}</span>`;
        track.appendChild(block);
      });

      row.appendChild(lbl); row.appendChild(track);
      inner.appendChild(row);
    });
  });

  outer.appendChild(inner);
  container.appendChild(outer);
  // store bounds for now-line calculations
  container.dataset.min=min; container.dataset.max=max; container.dataset.lblW=lblW;

  // scroll to now on load
  setTimeout(()=>{
    const nowMin=nowMinutes();
    const scrollTo=Math.max(0,(nowMin-min-30)*PX_PER_MIN);
    outer.scrollLeft=scrollTo;
    updateNowLine();
  },100);
}

function updateNowLine(){
  if(!liveMode) return;
  const container=document.getElementById('timelineContainer');
  const min=parseInt(container.dataset.min||480);
  const max=parseInt(container.dataset.max||1200);
  const lblW=parseInt(container.dataset.lblW||200);
  const nowMin=nowMinutes();
  const nowLine=document.getElementById('tlNowLine');
  const outer=document.getElementById('tlScroll');
  if(!nowLine||!outer) return;
  if(nowMin>=min&&nowMin<=max){
    nowLine.style.display='block';
    const nowPx=lblW+(nowMin-min)*PX_PER_MIN;
    nowLine.style.left=nowPx+'px';
    // auto-scroll to keep now-line 1/3 from the left edge of the visible area
    const visibleW=outer.clientWidth;
    const targetScroll=nowPx-lblW-(visibleW-lblW)*0.33;
    const currentScroll=outer.scrollLeft;
    // only scroll if now-line is near the edge (within 60px) to avoid jarring movement
    const nowLineVisible=nowPx-currentScroll;
    if(nowLineVisible<lblW+60 || nowLineVisible>visibleW-60){
      outer.scrollLeft=Math.max(0,targetScroll);
    }
  } else {
    nowLine.style.display='none';
  }
  // dim inactive blocks, highlight active
  document.querySelectorAll('.tl-block').forEach(b=>{
    const s=parseInt(b.dataset.startMin), e=parseInt(b.dataset.endMin);
    if(nowMin>=s&&nowMin<e){ b.classList.remove('dim'); }
    else { b.classList.add('dim'); }
  });
}

function checkFlash(){
  if(!liveMode) return;
  const nowMin=nowMinutes();
  document.querySelectorAll('.tl-block').forEach(b=>{
    const s=parseInt(b.dataset.startMin);
    const diff=s-nowMin;
    // flash label for 90 secs before rotation change
    if(diff>-1.5&&diff<1.5) b.classList.add('flash');
    else b.classList.remove('flash');
  });
}

// ================================================================
// INIT
// ================================================================
async function init(){
  try{
    await fetchData();
  }catch(e){
    console.warn('fetchData failed:', e);
  }
  if(!DATA.groups) DATA.groups=[];
  if(!DATA.locations) DATA.locations=[];
  if(!DATA.sessions) DATA.sessions={};
  DAYS.forEach(d=>{ if(!DATA.sessions[d]) DATA.sessions[d]={}; });
  renderTabs();
  renderWeekTable();
  // start real-time sync
  startRealtimeListener();
  // add 📡 indicator to save status
  document.getElementById('saveStatus').textContent='📡 Live sync active';
  setTimeout(()=>{ document.getElementById('saveStatus').textContent=''; }, 2000);
  // live clock tick for header
  setInterval(()=>{
    if(!liveMode){
      const n=new Date();
      document.getElementById('liveClock').textContent=
        String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
    }
  },1000);
}
