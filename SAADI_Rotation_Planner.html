<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAADI Gymnastics — Rotation Planner</title>
<style>
  :root{
    --navy:#16243f;
    --navy-2:#223456;
    --gold:#c9a227;
    --gold-2:#e6c757;
    --red:#a32638;
    --paper:#f5f3ee;
    --line:#dcd7cc;
    --ink:#2b2b2b;
    --muted:#8a8478;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI', Arial, sans-serif; background:var(--paper); color:var(--ink);
  }
  header{
    background:var(--navy); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  header h1{ font-size:1.3rem; margin:0; font-weight:700; letter-spacing:.5px;}
  header h1 span{ color:var(--gold); }
  .top-actions button{
    background:var(--gold); color:var(--navy); border:none; padding:8px 14px; border-radius:4px; font-weight:700; cursor:pointer; font-size:.85rem;
  }
  .top-actions button:hover{ background:var(--gold-2); }
  .day-tabs{
    display:flex; gap:4px; padding:10px 16px 0; background:var(--navy-2); overflow-x:auto;
  }
  .day-tabs button{
    background:transparent; border:none; color:#cfd6e4; padding:10px 16px; border-radius:6px 6px 0 0; cursor:pointer; font-weight:600; font-size:.9rem; white-space:nowrap;
  }
  .day-tabs button.active{ background:var(--paper); color:var(--navy); }
  .day-tabs button:hover:not(.active){ background:rgba(255,255,255,.12); }

  .app{ display:flex; }
  aside.palette{
    width:200px; flex:0 0 200px; background:#fff; border-right:1px solid var(--line); padding:14px; height:calc(100vh - 110px); position:sticky; top:0; overflow-y:auto;
  }
  aside.palette h2{ font-size:.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:14px 0 6px; }
  aside.palette h2:first-child{ margin-top:0; }
  .chip{
    display:flex; align-items:center; gap:8px; padding:7px 10px; margin:4px 0; border-radius:5px; font-size:.78rem; font-weight:600; color:#fff; cursor:grab; user-select:none; border:1px solid rgba(0,0,0,.08);
  }
  .chip:active{ cursor:grabbing; }
  .chip.tbc{ background:#fff; color:var(--muted); border:1px dashed var(--muted); }
  .palette-hint{ font-size:.75rem; color:var(--muted); line-height:1.4; margin-top:14px; padding-top:10px; border-top:1px solid var(--line); }

  main{ flex:1; padding:16px; overflow-x:auto; }
  .section-title{
    font-size:.95rem; font-weight:700; color:var(--navy); margin:18px 0 8px; padding-bottom:4px; border-bottom:2px solid var(--gold);
  }
  .rec-class-title{
    font-size:.8rem; font-weight:700; color:#fff; background:var(--navy-2); padding:4px 10px; border-radius:4px 4px 0 0; margin-top:14px; display:inline-block;
  }

  .timeline-wrap{ position:relative; }
  .ruler{ display:flex; position:sticky; top:0; background:var(--paper); z-index:5; }
  .ruler .lane-label{ flex:0 0 170px; }
  .ruler .ruler-track{ position:relative; height:24px; border-bottom:1px solid var(--line); flex:1; }
  .ruler .tick{ position:absolute; top:0; bottom:0; border-left:1px solid var(--line); font-size:.68rem; color:var(--muted); padding-left:3px; }

  .lane{ display:flex; align-items:stretch; border-bottom:1px solid var(--line); min-height:64px; }
  .lane:hover{ background:rgba(201,162,39,.06); }
  .lane-label{
    flex:0 0 170px; padding:6px 8px; font-size:.78rem; font-weight:600; color:var(--navy); display:flex; align-items:center; background:#fff; border-right:1px solid var(--line); position:sticky; left:0; z-index:3;
  }
  .lane-track{ position:relative; flex:1; min-height:64px; }
  .lane-add{
    flex:0 0 22px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); font-weight:700; background:#fff; border-right:1px solid var(--line); font-size:.9rem;
  }
  .lane-add:hover{ color:#fff; background:var(--navy); }
  .grid-line{ position:absolute; top:0; bottom:0; border-left:1px dashed rgba(0,0,0,.05); }

  .block{
    position:absolute; top:4px; bottom:4px; border-radius:5px; color:#fff; font-size:.6rem; font-weight:600;
    padding:4px 6px; overflow:hidden; cursor:pointer; border:1px solid rgba(0,0,0,.15);
    display:flex; flex-direction:column; justify-content:center; gap:1px; line-height:1.2;
  }
  .block .loc{ font-weight:700; font-size:.68rem; white-space:nowrap; }
  .block .disc{ font-weight:600; font-size:.6rem; opacity:.85; white-space:nowrap; font-style:italic; }
  .block .ttl{ font-weight:400; opacity:.9; font-size:.6rem; white-space:nowrap; }
  .block.tbc{ background:repeating-linear-gradient(45deg,#eee,#eee 6px,#ddd 6px,#ddd 12px); color:var(--muted); border:1px dashed var(--muted); }
  .block.dragover{ outline:2px solid var(--navy); }
  .block.conflict{ outline:2px solid var(--red); box-shadow:0 0 0 3px rgba(163,38,56,.25); }
  .resize-handle{
    position:absolute; top:0; right:0; bottom:0; width:7px; cursor:ew-resize; background:rgba(255,255,255,.0);
  }
  .resize-handle:hover{ background:rgba(255,255,255,.45); }
  .block.resizing{ z-index:10; }

  /* Modal */
  .modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:50; }
  .modal-bg.open{ display:flex; }
  .modal{ background:#fff; border-radius:8px; padding:22px; width:340px; box-shadow:0 10px 40px rgba(0,0,0,.25); }
  .modal h3{ margin:0 0 12px; color:var(--navy); font-size:1.05rem; }
  .modal label{ display:block; font-size:.78rem; font-weight:700; color:var(--navy); margin:10px 0 3px; }
  .modal input, .modal select{ width:100%; padding:7px 8px; border:1px solid var(--line); border-radius:4px; font-size:.85rem; }
  .modal .row{ display:flex; gap:10px; }
  .modal .row > div{ flex:1; }
  .modal-actions{ display:flex; justify-content:space-between; margin-top:18px; gap:8px; }
  .modal-actions button{ border:none; padding:8px 14px; border-radius:4px; font-weight:700; cursor:pointer; font-size:.82rem; }
  .btn-save{ background:var(--gold); color:var(--navy); }
  .btn-save:hover{ background:var(--gold-2); }
  .btn-cancel{ background:#eee; color:var(--ink); }
  .btn-cancel:hover{ background:#ddd; }
  .btn-delete{ background:var(--red); color:#fff; }
  .btn-delete:hover{ background:#8a1f2f; }
  .btn-add{
    margin-top:8px; background:var(--navy); color:#fff; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:.78rem; font-weight:600;
  }
  .btn-add:hover{ background:var(--navy-2); }

  .live-clock{ font-family:'Courier New',monospace; font-size:1rem; font-weight:700; color:var(--gold); margin-right:6px; letter-spacing:1px; }

  .now-line{ position:absolute; top:0; bottom:0; width:3px; background:var(--red); z-index:7; box-shadow:0 0 6px var(--red); display:none; pointer-events:none; }
  .now-line::before{ content:''; position:absolute; top:-7px; left:-5px; width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:7px solid var(--red); }

  .block.active-now{ box-shadow:0 0 0 3px var(--gold), 0 0 14px rgba(201,162,39,.7); z-index:6; }

  @keyframes flashLane{ 0%,100%{ background:var(--paper); color:var(--navy); } 50%{ background:var(--red); color:#fff; } }
  .lane-label.flash{ animation: flashLane .7s ease-in-out infinite; }

  .legend-note{ font-size:.7rem; color:var(--muted); margin-top:6px; }

  body.live-mode aside.palette{ display:none; }
  body.live-mode .legend-note{ display:none; }
  body.live-mode .lane-add{ display:none; }
  body.live-mode .section-title .btn-add{ display:none; }
  body.live-mode .top-actions button:not(#liveBtn){ display:none; }
  body.live-mode header h1{ font-size:1.6rem; }
  body.live-mode .live-clock{ font-size:1.4rem; }
  body.live-mode main{ padding:8px; }

  .totals-table{ border-collapse:collapse; font-size:.78rem; width:100%; background:#fff; }
  .totals-table th, .totals-table td{ border:1px solid var(--line); padding:6px 8px; text-align:center; }
  .totals-table th{ background:var(--navy); color:#fff; font-weight:700; font-size:.72rem; }
  .totals-table td.lane-name{ text-align:left; font-weight:700; color:var(--navy); background:#fff; position:sticky; left:0; }
  .totals-table td.cell{ cursor:pointer; }
  .totals-table td.cell:hover{ background:var(--gold-2); }
  .totals-table td.cell.empty{ color:var(--muted); cursor:default; }
  .totals-table td.cell.empty:hover{ background:#fff; }
  .summary-row{ display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--line); font-size:.8rem; cursor:pointer; }
  .summary-row:hover{ background:rgba(201,162,39,.12); }
  .summary-row .meta{ color:var(--muted); font-size:.72rem; }
</style>
</head>
<body>
<header>
  <h1>SAADI <span>Rotation Planner</span></h1>
  <div class="top-actions">
    <span id="liveClock" class="live-clock"></span>
    <button id="liveBtn" onclick="toggleLive()">▶ Go Live</button>
    <button onclick="exportData()">Download data (JSON)</button>
    <button onclick="document.getElementById('importFile').click()">Load saved data</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
  </div>
</header>
<div class="day-tabs" id="dayTabs"></div>
<div class="app">
  <aside class="palette" id="palette"></aside>
  <main>
    <div id="timeline"></div>
    <div class="legend-note">Drag a coloured chip from the left onto any block to set its location. Drag one block onto another to swap their locations. Click a block to edit its details, or use "+ Add session" under a group to add a new block.</div>
  </main>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Edit session</h3>
    <label>Group / Colour name (renames the whole row)</label>
    <input type="text" id="f_lane">
    <div class="row">
      <div><label>Start</label><input type="text" id="f_start" placeholder="e.g. 4:00pm"></div>
      <div><label>End</label><input type="text" id="f_end" placeholder="e.g. 4:30pm"></div>
    </div>
    <label>Location</label>
    <select id="f_location"></select>
    <label>Discipline (set automatically from location)</label>
    <input type="text" id="f_discipline" disabled>
    <label>Activity (optional)</label>
    <input type="text" id="f_title">
    <div class="modal-actions">
      <button class="btn-delete" onclick="deleteBlock()">Delete session</button>
      <span style="flex:1"></span>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="summaryModalBg">
  <div class="modal" style="width:420px;">
    <h3 id="summaryModalTitle">Sessions</h3>
    <div id="summaryModalBody" style="max-height:360px; overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSummaryModal()">Close</button>
    </div>
  </div>
</div>

  {code:"VAULT FLATBACK", color:"#C9722E"},
  {code:"CAFE", color:"#BFA98F"},
  {code:"TBC", color:"#BBBBBB"},
];
const LOC_MAP = Object.fromEntries(LOCATIONS.map(l=>[l.code,l]));
const FLOOR_GROUP = ["FLOOR 1","FLOOR 2","FLOOR 3","FULL FLOOR"];
const NO_CONFLICT = ["TBC","CAFE"];

const DISCIPLINE_MAP = {
  "FLOOR 1":"Floor","FLOOR 2":"Floor","FLOOR 3":"Floor","FULL FLOOR":"Floor",
  "BARS":"Bars","BARS PITSIDE":"Bars","HIGH BAR":"Bars","P-BARS":"Bars",
  "BEAMS 1 & 2":"Beam","BEAMS 3 & LOW BEAMS":"Beam",
  "VAULT MAIN":"Vault","VAULT FLATBACK":"Vault",
  "TUMBLE TRACK":"Tumble/Track","FAST TRACK":"Tumble/Track",
  "POMMEL":"Pommel/Rings","RINGS":"Pommel/Rings",
  "PINK ROOM":"Rooms","BLUE ROOM":"Rooms","DANCE STUDIO":"Rooms","CAFE":"Rooms",
};
function getDiscipline(loc){ return DISCIPLINE_MAP[loc] || ''; }
const DISCIPLINES = ['Floor','Bars','Beam','Vault','Tumble/Track','Pommel/Rings','Rooms','Other / TBC'];

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAY_BY_JSDAY = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let currentDay = "Monday";
let PX_PER_MIN = 7;
let currentMin = 0, currentMax = 0;
let liveMode = false;
let alertsEnabled = false;
let audioCtx = null;
let lastPingKey = null;

function getTodayName(){ return DAY_BY_JSDAY[new Date().getDay()]; }
function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes() + d.getSeconds()/60;
}

function fmtTime(mins){
  let h = Math.floor(mins/60), m = mins%60;
  let ap = h>=12 ? 'pm':'am';
  let h12 = h%12; if(h12===0) h12=12;
  return h12 + (m? ':'+String(m).padStart(2,'0') : '') + ap;
}

function getDayBounds(dayData){
  const all = [...dayData.squad, ...dayData.recreational];
  if(all.length===0) return {min:8*60, max:20*60};
  let min = Math.min(...all.map(b=>b.start_min));
  let max = Math.max(...all.map(b=>b.end_min));
  return {min, max};
}

function isConflict(a,b){
  if(NO_CONFLICT.includes(a.location) || NO_CONFLICT.includes(b.location)) return false;
  if(a.start_min >= b.end_min || b.start_min >= a.end_min) return false; // no overlap
  if(a.location === b.location) return true;
  if(FLOOR_GROUP.includes(a.location) && FLOOR_GROUP.includes(b.location)) return true;
  return false;
}

function computeConflicts(blocks){
  const flags = new Array(blocks.length).fill(false);
  for(let i=0;i<blocks.length;i++){
    for(let j=i+1;j<blocks.length;j++){
      if(isConflict(blocks[i], blocks[j])){
        flags[i]=true; flags[j]=true;
      }
    }
  }
  return flags;
}

function buildRuler(min,max){
  const width = (max-min)*PX_PER_MIN;
  const ruler = document.createElement('div');
  ruler.className='ruler';
  const label = document.createElement('div'); label.className='lane-label'; label.textContent='Time';
  ruler.appendChild(label);
  const track = document.createElement('div'); track.className='ruler-track'; track.style.width=width+'px';
  for(let t=min - (min%30 || 30) + 30; t<=max; t+=30){
    if(t<min) continue;
    const tick = document.createElement('div'); tick.className='tick';
    tick.style.left = ((t-min)*PX_PER_MIN)+'px';
    tick.textContent = fmtTime(t);
    track.appendChild(tick);
  }
  ruler.appendChild(track);
  return ruler;
}

function buildLane(label, blocksWithMeta, min, max, meta){
  const width = (max-min)*PX_PER_MIN;
  const lane = document.createElement('div'); lane.className='lane';
  lane.dataset.section = meta.section;
  lane.dataset.laneKey = meta.section==='squad' ? meta.lane : meta.colour;
  const lbl = document.createElement('div'); lbl.className='lane-label';
  lbl.innerHTML = '<span>'+label+'</span>';
  lane.appendChild(lbl);
  const track = document.createElement('div'); track.className='lane-track'; track.style.width=width+'px';
  for(let t=min - (min%30 || 30) + 30; t<=max; t+=30){
    if(t<min) continue;
    const gl = document.createElement('div'); gl.className='grid-line'; gl.style.left=((t-min)*PX_PER_MIN)+'px';
    track.appendChild(gl);
  }
  const addBtn = document.createElement('div');
  addBtn.className = 'lane-add';
  addBtn.textContent = '+';
  addBtn.title = 'Add a session for '+label;
  addBtn.onclick = ()=> addBlock(meta, min, max);
  lane.appendChild(addBtn);

  blocksWithMeta.forEach(({block, conflict, section, idx})=>{
    const div = document.createElement('div');
    div.className = 'block' + (block.location==='TBC'?' tbc':'') + (conflict?' conflict':'');
    div.style.left = ((block.start_min-min)*PX_PER_MIN)+'px';
    div.style.width = Math.max((block.end_min-block.start_min)*PX_PER_MIN - 2, 18)+'px';
    if(block.location!=='TBC' && LOC_MAP[block.location]) div.style.background = LOC_MAP[block.location].color;
    const disc = getDiscipline(block.location);
    div.innerHTML = '<div class="loc">'+block.location+'</div>'
      + (disc ? '<div class="disc">'+disc+'</div>' : '')
      + (block.title ? '<div class="ttl">'+block.title+'</div>' : '');
    div.title = label+': '+block.start+'–'+block.end+(block.title? ' · '+block.title:'');
    div.draggable = true;
    div.dataset.section = section;
    div.dataset.idx = idx;
    div.ondragstart = e=> e.dataTransfer.setData('text/plain','block:'+section+':'+idx);
    div.ondragover = e=>{ e.preventDefault(); div.classList.add('dragover'); };
    div.ondragleave = ()=> div.classList.remove('dragover');
    div.ondrop = e=>{
      e.preventDefault(); div.classList.remove('dragover');
      const data = e.dataTransfer.getData('text/plain');
      if(data.startsWith('palette:')){
        block.location = data.split(':')[1];
        render();
      } else if(data.startsWith('block:')){
        const [, srcSection, srcIdx] = data.split(':');
        const src = DATA[currentDay][srcSection][parseInt(srcIdx)];
        const tmp = src.location; src.location = block.location; block.location = tmp;
        render();
      }
    };
    div.onclick = ()=> openModal(section, idx);

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.draggable = false;
    handle.onclick = e=> e.stopPropagation();
    handle.onmousedown = (e)=>{
      e.preventDefault(); e.stopPropagation();
      const startX = e.clientX;
      const origEnd = block.end_min;
      div.classList.add('resizing');
      const onMove = (ev)=>{
        const deltaPx = ev.clientX - startX;
        let deltaMin = Math.round(deltaPx/PX_PER_MIN/5)*5;
        let newEnd = Math.max(block.start_min+5, origEnd+deltaMin);
        div.style.width = Math.max((newEnd-block.start_min)*PX_PER_MIN - 2, 18)+'px';
        div._pendingEnd = newEnd;
      };
      const onUp = ()=>{
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        div.classList.remove('resizing');
        if(div._pendingEnd!==undefined){
          block.end_min = div._pendingEnd;
          block.end = fmtTime(block.end_min);
          delete div._pendingEnd;
          render();
        }
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    };
    div.appendChild(handle);

    track.appendChild(div);
  });
  lane.appendChild(track);
  return lane;
}

function renderTimeline(){
  const el = document.getElementById('timeline');
  el.innerHTML = '';
  const dayData = DATA[currentDay];
  const {min,max} = getDayBounds(dayData);
  currentMin = min; currentMax = max;

  const allBlocks = [
    ...dayData.squad.map((b,i)=>({block:b, section:'squad', idx:i})),
    ...dayData.recreational.map((b,i)=>({block:b, section:'recreational', idx:i})),
  ];
  const conflictFlags = computeConflicts(allBlocks.map(x=>x.block));
  allBlocks.forEach((x,i)=> x.conflict = conflictFlags[i]);

  // Squad section
  {
    const h = document.createElement('div'); h.className='section-title';
    h.innerHTML = 'Squads <button class="btn-add" style="margin-left:10px;" onclick="addGroup(\'squad\')">+ Add group</button>';
    el.appendChild(h);
    const squadLanes = [...new Set(dayData.squad.map(b=>b.lane))];
    if(squadLanes.length){
      const wrap = document.createElement('div'); wrap.className='timeline-wrap';
      wrap.appendChild(buildRuler(min,max));
      squadLanes.forEach(laneName=>{
        const blocksWithMeta = allBlocks.filter(x=>x.section==='squad' && x.block.lane===laneName);
        wrap.appendChild(buildLane(laneName, blocksWithMeta, min, max, {section:'squad', lane:laneName}));
      });
      el.appendChild(wrap);
    } else {
      const p = document.createElement('p'); p.style.color='var(--muted)'; p.style.fontSize='.8rem'; p.textContent='No squad groups yet for '+currentDay+'.';
      el.appendChild(p);
    }
  }

  // Recreational section - one row per colour group, spanning all classes
  {
    const h = document.createElement('div'); h.className='section-title';
    h.innerHTML = 'Recreational <button class="btn-add" style="margin-left:10px;" onclick="addGroup(\'recreational\')">+ Add group</button>';
    el.appendChild(h);
    const order = ['Orange','Yellow','Blue','Green','Red','Purple'];
    const colours = [...new Set(dayData.recreational.map(b=>b.colour))]
      .sort((a,b)=> order.indexOf(a)-order.indexOf(b));
    if(colours.length){
      const wrap = document.createElement('div'); wrap.className='timeline-wrap';
      wrap.appendChild(buildRuler(min,max));
      colours.forEach(colour=>{
        const blocksWithMeta = allBlocks.filter(x=>x.section==='recreational' && x.block.colour===colour);
        wrap.appendChild(buildLane(colour, blocksWithMeta, min, max, {section:'recreational', cls:null, colour:colour}));
      });
      el.appendChild(wrap);
    } else {
      const p = document.createElement('p'); p.style.color='var(--muted)'; p.style.fontSize='.8rem'; p.textContent='No recreational groups yet for '+currentDay+'.';
      el.appendChild(p);
    }
  }

  if(dayData.squad.length===0 && dayData.recreational.length===0){
    el.innerHTML += '<p style="color:var(--muted); padding:10px 0;">No sessions recorded for '+currentDay+' yet — use "+ Add group" above to start building it out.</p>';
  }
}

function addGroup(section){
  const name = prompt(section==='squad' ? 'Name of the new squad/group:' : 'Name of the new colour group:');
  if(!name || !name.trim()) return;
  const start_min = Math.round(getDayBounds(DATA[currentDay]).min/5)*5;
  const end_min = start_min+30;
  const newBlock = {
    start: fmtTime(start_min), end: fmtTime(end_min),
    start_min, end_min, location:'TBC', title:'', raw:''
  };
  if(section==='squad'){
    newBlock.lane = name.trim();
  } else {
    newBlock.class=''; newBlock.colour=name.trim(); newBlock.lane=name.trim(); newBlock.block='New session';
  }
  DATA[currentDay][section].push(newBlock);
  render();
}

function addBlock(meta, min, max){
  const start_min = Math.max(min, Math.round(min/5)*5);
  const end_min = Math.min(max, start_min+30);
  const newBlock = {
    start: fmtTime(start_min), end: fmtTime(end_min),
    start_min, end_min, location:'TBC', title:'', raw:''
  };
  if(meta.section==='squad'){
    newBlock.lane = meta.lane;
  } else {
    newBlock.class = meta.cls || ''; newBlock.colour = meta.colour;
    newBlock.lane = meta.colour;
    newBlock.block = 'New session';
  }
  DATA[currentDay][meta.section].push(newBlock);
  render();
}

function render(){
  renderTabs();
  if(currentDay==='Weekly Totals'){
    renderWeeklyTotals();
  } else {
    renderTimeline();
  }
}

// ---- Modal ----
let editing = null;
function openModal(section, idx){
  editing = {section, idx};
  const b = DATA[currentDay][section][idx];
  document.getElementById('modalTitle').textContent = (section==='squad'? b.lane : b.colour+' — '+b.block);
  document.getElementById('f_lane').value = section==='squad' ? b.lane : b.colour;
  document.getElementById('f_lane').disabled = false;
  document.getElementById('f_start').value = b.start;
  document.getElementById('f_end').value = b.end;
  document.getElementById('f_title').value = b.title || '';
  const sel = document.getElementById('f_location');
  document.getElementById('f_discipline').value = getDiscipline(b.location) || '—';
  sel.innerHTML = LOCATIONS.map(l=>'<option value="'+l.code+'"'+(l.code===b.location?' selected':'')+'>'+l.code+'</option>').join('')
    + '<option value="__new__">+ Add new location...</option>';
  sel.onchange = ()=>{
    if(sel.value==='__new__'){
      const name = prompt('Name for the new location (e.g. STORE ROOM):');
      if(name && name.trim()){
        const code = name.trim().toUpperCase();
        if(!LOC_MAP[code]){
          const palette = ["#7C9D96","#A2845E","#6E7F80","#9C7C9C","#8A9B6E","#B08968"];
          const color = palette[LOCATIONS.length % palette.length];
          LOCATIONS.push({code, color});
          LOC_MAP[code] = {code, color};
          renderPalette();
        }
        sel.innerHTML = LOCATIONS.map(l=>'<option value="'+l.code+'"'+(l.code===code?' selected':'')+'>'+l.code+'</option>').join('')
          + '<option value="__new__">+ Add new location...</option>';
      } else {
        sel.value = b.location;
      }
    }
    document.getElementById('f_discipline').value = getDiscipline(sel.value) || '—';
  };
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  editing = null;
}
function deleteBlock(){
  if(!editing) return;
  if(!confirm('Delete this session? This cannot be undone.')) return;
  DATA[currentDay][editing.section].splice(editing.idx, 1);
  closeModal();
  render();
}
function parseTimeToMin(t){
  t = t.trim().toLowerCase();
  const m = t.match(/(\d+):?(\d*)\s*(am|pm)/);
  if(!m) return null;
  let h = parseInt(m[1]), mi = m[2]? parseInt(m[2]):0;
  const ap = m[3];
  if(ap==='pm' && h!==12) h+=12;
  if(ap==='am' && h===12) h=0;
  return h*60+mi;
}
function saveModal(){
  if(!editing) return;
  const b = DATA[currentDay][editing.section][editing.idx];
  const newStart = document.getElementById('f_start').value;
  const newEnd = document.getElementById('f_end').value;
  const sMin = parseTimeToMin(newStart), eMin = parseTimeToMin(newEnd);
  if(sMin===null || eMin===null || eMin<=sMin){
    alert('Please enter valid start and end times (e.g. 4:00pm and 4:30pm), with end after start.');
    return;
  }
  b.start = newStart; b.end = newEnd; b.start_min = sMin; b.end_min = eMin;
  b.location = document.getElementById('f_location').value;
  b.title = document.getElementById('f_title').value;

  const newName = document.getElementById('f_lane').value.trim();
  const oldName = editing.section==='squad' ? b.lane : b.colour;
  if(newName && newName !== oldName){
    DATA[currentDay][editing.section].forEach(blk=>{
      if(editing.section==='squad' && blk.lane===oldName) blk.lane = newName;
      if(editing.section==='recreational' && blk.colour===oldName) blk.colour = newName;
    });
  }
  closeModal();
  render();
}

function exportData(){

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const imported = JSON.parse(e.target.result);
      Object.assign(DATA, imported);
      render();
    }catch(err){ alert('Could not read that file: '+err.message); }
  };
  reader.readAsText(file);
}

// ---- Weekly Totals ----
function fmtDuration(mins){
  if(mins<=0) return '–';
  const h = Math.floor(mins/60), m = mins%60;
  if(h===0) return m+'m';
  if(m===0) return h+'h';
  return h+'h '+m+'m';
}

function renderWeeklyTotals(){
  const el = document.getElementById('timeline');
  el.innerHTML = '';

  const h = document.createElement('div'); h.className='section-title';
  h.textContent = 'Weekly total time per group, by discipline';
  el.appendChild(h);

  // totals[lane][discipline] = minutes ; sessions[lane][discipline] = [...]
  const totals = {}; const sessions = {};
  const laneOrder = [];
  DAYS.forEach(day=>{
    ['squad','recreational'].forEach(section=>{
      DATA[day][section].forEach((b,idx)=>{
        const lane = section==='squad' ? b.lane : b.colour;
        const disc = getDiscipline(b.location) || 'Other / TBC';
        const dur = Math.max(0, b.end_min - b.start_min);
        if(!totals[lane]){ totals[lane]={}; laneOrder.push(lane); }
        totals[lane][disc] = (totals[lane][disc]||0) + dur;
        sessions[lane] = sessions[lane] || {};
        sessions[lane][disc] = sessions[lane][disc] || [];
        sessions[lane][disc].push({day, section, idx, start:b.start, end:b.end, location:b.location, title:b.title});
      });
    });
  });
  laneOrder.sort();

  const table = document.createElement('table'); table.className='totals-table';
  const thead = document.createElement('tr');
  thead.innerHTML = '<th style="text-align:left;">Group</th>' + DISCIPLINES.map(d=>'<th>'+d+'</th>').join('') + '<th>Total</th>';
  table.appendChild(thead);

  laneOrder.forEach(lane=>{
    const tr = document.createElement('tr');
    const nameTd = document.createElement('td'); nameTd.className='lane-name'; nameTd.textContent = lane;
    tr.appendChild(nameTd);
    let rowTotal = 0;
    DISCIPLINES.forEach(disc=>{
      const mins = (totals[lane] && totals[lane][disc]) || 0;
      rowTotal += mins;
      const td = document.createElement('td');
      td.className = 'cell' + (mins===0 ? ' empty' : '');
      td.textContent = fmtDuration(mins);
      if(mins>0) td.onclick = ()=> openSummaryModal(lane, disc, sessions[lane][disc]);
      tr.appendChild(td);
    });
    const totalTd = document.createElement('td'); totalTd.style.fontWeight='700'; totalTd.textContent = fmtDuration(rowTotal);
    tr.appendChild(totalTd);
    table.appendChild(tr);
  });

  el.appendChild(table);
}

function openSummaryModal(lane, disc, list){

}
document.getElementById('summaryModalBg') && (document.getElementById('summaryModalBg').onclick = function(e){

// ---- Live tracking ----
function playPing(){
  if(!alertsEnabled) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    [880, 1320].forEach((freq, i)=>{
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      const start = audioCtx.currentTime + i*0.18;
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(0.25, start+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, start+0.5);
      o.start(start); o.stop(start+0.55);
    });
  }catch(e){}
}

function enterFullscreen(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req) req.call(el);
}
function exitFullscreen(){
  const ex = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if(ex) ex.call(document);
}
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}

function exitLiveMode(){
  if(!liveMode) return;
  liveMode = false;
  document.getElementById('liveBtn').textContent = '▶ Go Live';
  document.body.classList.remove('live-mode');
  alertsEnabled = false;
  if(isFullscreen()) exitFullscreen();
  document.querySelectorAll('.now-line').forEach(l=> l.style.display='none');
  document.querySelectorAll('.block.active-now').forEach(b=> b.classList.remove('active-now'));
  document.querySelectorAll('.lane-label.flash').forEach(l=> l.classList.remove('flash'));
}

function toggleLive(){
  if(liveMode){ exitLiveMode(); return; }
  liveMode = true;
  document.getElementById('liveBtn').textContent = '⏸ Exit Live View';
  document.body.classList.add('live-mode');
  enterFullscreen();
  alertsEnabled = true;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
  playPing();
  currentDay = getTodayName();
  if(!DATA[currentDay]) currentDay = 'Monday';
  render();
  setTimeout(scrollToNow, 100);
}

document.addEventListener('fullscreenchange', ()=>{ if(!isFullscreen()) exitLiveMode(); });
document.addEventListener('webkitfullscreenchange', ()=>{ if(!isFullscreen()) exitLiveMode(); });

function hasNextBlock(blocks, b, section){
  return blocks.some(o=> o!==b
    && (section==='squad' ? o.lane===b.lane : o.colour===b.colour)
    && o.start_min === b.end_min);
}

function scrollToNow(){
  const wrap = document.querySelector('.timeline-wrap');
  if(!wrap) return;
  const nowMin = nowMinutes();
  if(nowMin < currentMin || nowMin > currentMax) return;
  const target = 170 + (nowMin-currentMin)*PX_PER_MIN;
  const m = document.querySelector('main');
  m.scrollLeft = Math.max(0, target - m.clientWidth/2);
}

function updateLiveIndicators(){
  const now = new Date();
  document.getElementById('liveClock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  if(!liveMode || currentDay==='Weekly Totals') return;

  const today = getTodayName();
  if(today !== currentDay && DATA[today]){
    currentDay = today;
    render();
    setTimeout(scrollToNow, 50);
    return;
  }

  const nowMin = nowMinutes();
  const inRange = nowMin>=currentMin && nowMin<=currentMax;

  document.querySelectorAll('.timeline-wrap').forEach(wrap=>{
    let line = wrap.querySelector('.now-line');
    if(!line){ line = document.createElement('div'); line.className='now-line'; wrap.appendChild(line); }
    if(inRange){
      line.style.left = (170 + (nowMin-currentMin)*PX_PER_MIN)+'px';
      line.style.display='block';
    } else {
      line.style.display='none';
    }
  });

  if(inRange) scrollToNow();

  let shouldPing = false;
  document.querySelectorAll('.lane').forEach(lane=>{
    const section = lane.dataset.section;
    const blocks = DATA[currentDay][section];
    let flashing = false;
    lane.querySelectorAll('.block').forEach(div=>{
      const idx = parseInt(div.dataset.idx);
      const b = blocks[idx];
      const active = nowMin >= b.start_min && nowMin < b.end_min;
      div.classList.toggle('active-now', active);
      const diff = nowMin - b.end_min;
      if(diff >= -0.5 && diff <= 1.5 && hasNextBlock(blocks, b, section)){
        flashing = true;
        if(diff >= 0 && diff < 1) shouldPing = true;
      }
    });
    const lbl = lane.querySelector('.lane-label');
    if(lbl) lbl.classList.toggle('flash', flashing);
  });

  if(shouldPing){
    const key = currentDay+':'+Math.floor(nowMin);
    if(lastPingKey !== key){ playPing(); lastPingKey = key; }
  }
}

render();
setInterval(updateLiveIndicators, 1000);
</script>
</body>
</html>
